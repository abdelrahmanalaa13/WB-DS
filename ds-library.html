  <script>
    /* ============================================================
       ICONS
       ============================================================ */
    const ICONS = {
      plus: '<i class="hgi-stroke hgi-add-01"></i>',
      star: '<i class="hgi-stroke hgi-star"></i>',
      heart: '<i class="hgi-stroke hgi-favourite"></i>',
      close: '<i class="hgi-stroke hgi-cancel-01"></i>',
      check: '<i class="hgi-stroke hgi-tick-01"></i>',
      settings: '<i class="hgi-stroke hgi-settings-01"></i>',
      user: '<i class="hgi-stroke hgi-user"></i>',
      sparkle: '<i class="hgi-stroke hgi-sparkles"></i>',
      bell: '<i class="hgi-stroke hgi-notification-01"></i>',
      alert: '<i class="hgi-stroke hgi-alert-circle"></i>',
      info: '<i class="hgi-stroke hgi-information-circle"></i>',
      warning: '<i class="hgi-stroke hgi-alert-02"></i>',
      danger: '<i class="hgi-stroke hgi-danger"></i>',
      minimize: '<i class="hgi-stroke hgi-minimize-01"></i>',
      maximize: '<i class="hgi-stroke hgi-maximize-01"></i>',
      edit: '<i class="hgi-stroke hgi-pencil-edit-01"></i>',
      copy: '<i class="hgi-stroke hgi-copy-01"></i>',
      send: '<i class="hgi-stroke hgi-sent"></i>',
      more: '<i class="hgi-stroke hgi-more-vertical"></i>',
      refresh: '<i class="hgi-stroke hgi-refresh"></i>',
      clock: '<i class="hgi-stroke hgi-clock-01"></i>',
      chart: '<i class="hgi-stroke hgi-chart-column"></i>',
      users: '<i class="hgi-stroke hgi-user-group"></i>',
      search: '<i class="hgi-stroke hgi-search-01"></i>',
      chevronRight: '<i class="hgi-stroke hgi-arrow-right-01"></i>',
      chevronLeft: '<i class="hgi-stroke hgi-arrow-left-01"></i>',
      chevronDown: '<i class="hgi-stroke hgi-arrow-down-01"></i>',
      menu: '<i class="hgi-stroke hgi-hamburger-01"></i>',
      upload: '<i class="hgi-stroke hgi-upload-01"></i>',
      file: '<i class="hgi-stroke hgi-file-01"></i>',
      folder: '<i class="hgi-stroke hgi-folder-01"></i>',
      calendar: '<i class="hgi-stroke hgi-calendar-01"></i>',
      home: '<i class="hgi-stroke hgi-home-01"></i>',
      trash: '<i class="hgi-stroke hgi-delete-02"></i>',
      book: '<i class="hgi-stroke hgi-book-open-01"></i>',
      billing: '<i class="hgi-stroke hgi-credit-card-01"></i>',
      code: '<i class="hgi-stroke hgi-code-01"></i>',
    };

    /* ============================================================
       COMPONENT CONFIGURATIONS
       ============================================================ */
    const COMPONENTS = {
      button: {
        name: 'Button',
        description: 'Primary action trigger with multiple variants',
        controls: {
          emphasis: ['filled', 'tonal', 'outlined', 'ghost'],
          color: ['primary', 'danger', 'warning', 'success', 'neutral', 'ai'],
          size: ['xs', 'sm', 'md', 'lg', 'xl'],
          state: ['default', 'hover', 'disabled'],
        },
        defaults: {
          emphasis: 'filled',
          color: 'primary',
          size: 'md',
          state: 'default',
        },
        render: (config) => {
          const { emphasis, color, size, state } = config;
          const disabled = state === 'disabled';
          const hovered = state === 'hover';
          const stateClass = disabled ? ' disabled' : hovered ? ' hover' : '';

          // With icon, text only, icon only
          const variants = [
            { label: 'Button', icon: ICONS.plus },
            { label: 'Button', icon: null },
          ];

          let html = `<div style="display:flex;align-items:center;gap:12px;flex-wrap:wrap;">`;
          variants.forEach(v => {
            const classes = `ds-button ${emphasis} ${color} ${size}${stateClass}`;
            html += `<button class="${classes}" ${disabled ? 'disabled' : ''}>`;
            if (v.icon) html += v.icon;
            html += ` ${v.label}</button>`;
          });
          html += `</div>`;
          return html;
        },
        tokens: (config) => {
          const { emphasis, color } = config;
          const tokens = {
            'radius': `--radius-md`,
            'motion': `--motion-fast`,
          };
          if (emphasis === 'filled' || emphasis === 'tonal') {
            tokens[`${color}-${emphasis}-bg`] = `--${color}-${emphasis}-bg`;
            tokens[`${color}-${emphasis}-fg`] = `--${color}-${emphasis}-fg`;
          } else if (emphasis === 'outlined') {
            tokens[`${color}-outline-fg`] = `--${color}-outline-fg`;
            tokens[`${color}-outline-border`] = `--${color}-outline-border`;
          } else if (emphasis === 'ghost') {
            tokens[`${color}-ghost-fg`] = `--${color}-ghost-fg`;
          }
          return tokens;
        },
      },

      'icon-button': {
        name: 'Icon Button',
        description: 'Icon-only button for actions or toggles',
        controls: {
          emphasis: ['filled', 'tonal', 'outlined', 'ghost'],
          color: ['primary', 'danger', 'warning', 'success', 'neutral', 'ai'],
          size: ['xs', 'sm', 'md', 'lg', 'xl'],
          state: ['default', 'hover', 'disabled'],
        },
        defaults: {
          emphasis: 'tonal',
          color: 'primary',
          size: 'md',
          state: 'default',
        },
        render: (config) => {
          const { emphasis, color, size, state } = config;
          const disabled = state === 'disabled';
          const hovered = state === 'hover';
          const stateClass = disabled ? ' disabled' : hovered ? ' hover' : '';
          const icons = [ICONS.star, ICONS.heart, ICONS.settings];

          return icons.map((icon, i) => {
            const classes = `ds-icon-button ${emphasis} ${color} ${size}${stateClass}`;
            return `<button class="${classes}" ${disabled ? 'disabled' : ''}>${icon}</button>`;
          }).join('');
        },
        tokens: (config) => {
          const { emphasis, color } = config;
          const tokens = {
            'radius': `--radius-md`,
            'motion': `--motion-fast`,
          };
          if (emphasis === 'filled' || emphasis === 'tonal') {
            tokens[`${color}-${emphasis}-bg`] = `--${color}-${emphasis}-bg`;
            tokens[`${color}-${emphasis}-fg`] = `--${color}-${emphasis}-fg`;
          } else if (emphasis === 'outlined') {
            tokens[`${color}-outline-fg`] = `--${color}-outline-fg`;
            tokens[`${color}-outline-border`] = `--${color}-outline-border`;
          } else if (emphasis === 'ghost') {
            tokens[`${color}-ghost-fg`] = `--${color}-ghost-fg`;
          }
          return tokens;
        },
      },

      badge: {
        name: 'Badge',
        description: 'Status indicator with dot or count variants',
        controls: {
          type: ['dot', 'count'],
          color: ['primary', 'danger', 'warning', 'success', 'neutral', 'ai'],
          size: ['sm', 'md', 'lg'],
        },
        defaults: {
          type: 'count',
          color: 'primary',
          size: 'md',
        },
        render: (config) => {
          const { type, color, size } = config;
          const baseClass = `ds-badge ${type} ${color} ${size}`;
          let html = '';

          // Standalone badges
          html += `<div style="display:flex;gap:12px;align-items:center;margin-bottom:20px;">`;
          html += `<span style="font-size:var(--font-size-sm);color:var(--content-secondary);width:80px;">Standalone</span>`;
          if (type === 'dot') {
            html += `<div class="${baseClass}"></div>`;
          } else {
            [1, 5, 12, 99].forEach(n => {
              html += `<div class="${baseClass}">${n}</div>`;
            });
          }
          html += `</div>`;

          // Overlaid on icon button
          html += `<div style="display:flex;gap:16px;align-items:center;">`;
          html += `<span style="font-size:var(--font-size-sm);color:var(--content-secondary);width:80px;">On icon</span>`;
          html += `<div class="badge-container">
            <button class="ds-icon-button tonal neutral md">${ICONS.bell}</button>
            <div class="badge-overlay"><div class="${baseClass}">${type === 'dot' ? '' : '3'}</div></div>
          </div>`;
          html += `<div class="badge-container">
            <button class="ds-icon-button tonal neutral md">${ICONS.heart}</button>
            <div class="badge-overlay"><div class="${baseClass}">${type === 'dot' ? '' : '12'}</div></div>
          </div>`;
          html += `</div>`;

          return html;
        },
        tokens: (config) => {
          const { color } = config;
          return {
            [`${color}-filled-bg`]: `--${color}-filled-bg`,
            [`${color}-filled-fg`]: `--${color}-filled-fg`,
            'radius-full': `--radius-full`,
          };
        },
      },

      chip: {
        name: 'Chip',
        description: 'Compact interactive element for tags and selections',
        controls: {
          emphasis: ['tonal', 'outlined'],
          color: ['primary', 'danger', 'warning', 'success', 'neutral', 'ai'],
          size: ['sm', 'md', 'lg'],
          selected: ['unselected', 'selected'],
        },
        defaults: {
          emphasis: 'tonal',
          color: 'primary',
          size: 'md',
          selected: 'unselected',
        },
        render: (config) => {
          const { emphasis, color, size, selected } = config;
          const isSelected = selected === 'selected';
          const chips = [
            { label: 'Filter', icon: ICONS.star },
            { label: 'Tag', icon: null },
            { label: 'Category', icon: ICONS.settings },
          ];
          return chips.map(c => {
            const classes = `ds-chip ${emphasis} ${color} ${size}${isSelected ? ' selected' : ''}`;
            const leadingIcon = isSelected ? ICONS.check : (c.icon || '');
            return `<button class="${classes}">${leadingIcon} ${c.label}</button>`;
          }).join('');
        },
        tokens: (config) => {
          const { emphasis, color } = config;
          const tokens = { 'radius-full': '--radius-full' };
          if (emphasis === 'tonal') {
            tokens[`${color}-tonal-bg`] = `--${color}-tonal-bg`;
            tokens[`${color}-tonal-fg`] = `--${color}-tonal-fg`;
          } else {
            tokens[`${color}-outline-border`] = `--${color}-outline-border`;
            tokens[`${color}-outline-fg`] = `--${color}-outline-fg`;
          }
          return tokens;
        },
      },

      toggle: {
        name: 'Toggle',
        description: 'Switch control for on/off states',
        controls: {
          state: ['off', 'on'],
          size: ['sm', 'md', 'lg'],
          withLabel: ['no', 'yes'],
        },
        defaults: {
          state: 'off',
          size: 'md',
          withLabel: 'yes',
        },
        render: (config) => {
          const { state, size, withLabel } = config;
          const isOn = state === 'on';
          const showLabel = withLabel === 'yes';

          let html = `<div style="display:flex;gap:32px;align-items:center;">`;
          // Primary toggle showing selected state
          html += `<div class="ds-toggle">
            <button class="toggle-track ${size}${isOn ? ' on' : ''}">
              <div class="toggle-thumb"></div>
            </button>
            ${showLabel ? `<span class="toggle-label">${isOn ? 'Enabled' : 'Disabled'}</span>` : ''}
          </div>`;
          // Comparison toggle in opposite state
          html += `<div class="ds-toggle" style="opacity:0.5;">
            <button class="toggle-track ${size}${isOn ? '' : ' on'}">
              <div class="toggle-thumb"></div>
            </button>
            ${showLabel ? `<span class="toggle-label">${isOn ? 'Disabled' : 'Enabled'}</span>` : ''}
          </div>`;
          html += `</div>`;
          return html;
        },
        tokens: (config) => {
          return {
            'primary-filled-bg': `--primary-filled-bg`,
            'border-default': `--border-default`,
            'content-tertiary': `--content-tertiary`,
            'radius-full': `--radius-full`,
            'motion-fast': `--motion-fast`,
          };
        },
      },

      avatar: {
        name: 'Avatar',
        description: 'User representation with image, initials, or icon',
        controls: {
          type: ['image', 'initials', 'icon'],
          size: ['xs', 'sm', 'md', 'lg', 'xl'],
          shape: ['circle', 'rounded'],
          status: ['none', 'online', 'offline', 'busy', 'away'],
        },
        defaults: {
          type: 'initials',
          size: 'md',
          shape: 'circle',
          status: 'none',
        },
        render: (config) => {
          const { type, size, shape, status } = config;
          const baseClass = `ds-avatar ${size}${shape === 'rounded' ? ' rounded' : ''}`;
          let content = '';

          if (type === 'initials') {
            content = 'AB';
          } else if (type === 'icon') {

            <div class="ds-cmd-item active"><span class="ds-cmd-item-icon">${ICONS.chart}</span><div style="flex:1;min-width:0;"><div class="ds-cmd-item-label">${config.mode === 'command' ? 'Export Analytics Report' : 'Analytics Dashboard'}</div><div class="ds-cmd-item-desc">${config.mode === 'command' ? 'Generate and download PDF' : 'View real-time metrics and KPIs'}</div></div><span class="ds-cmd-item-shortcut">${config.mode === 'command' ? '&#9166;' : '&#8984;D'}</span></div>
            <div class="ds-cmd-item"><span class="ds-cmd-item-icon">${ICONS.users}</span><div style="flex:1;min-width:0;"><div class="ds-cmd-item-label">${config.mode === 'command' ? 'Invite Team Member' : 'Team Management'}</div><div class="ds-cmd-item-desc">${config.mode === 'command' ? 'Send invitation email' : 'Manage roles and permissions'}</div></div><span class="ds-cmd-item-shortcut">${config.mode === 'command' ? '&#9166;' : '&#8984;T'}</span></div>
            <div class="ds-cmd-item"><span class="ds-cmd-item-icon">${ICONS.settings}</span><div style="flex:1;min-width:0;"><div class="ds-cmd-item-label">Settings</div><div class="ds-cmd-item-desc">App configuration and preferences</div></div><span class="ds-cmd-item-shortcut">&#8984;,</span></div>
          ` : '';

          const emptyState = config.state === 'empty' ? `<div class="ds-cmd-empty">No results found for your query. Try a different search term.</div>` : '';

          const loadingState = config.state === 'loading' ? `<div class="ds-cmd-empty"><div class="ds-spinner sm"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><circle cx="12" cy="12" r="10" opacity="0.25"/><path d="M12 2a10 10 0 0 1 10 10"/></svg></div></div>` : '';

          const nestedBreadcrumb = config.mode === 'nested' ? `<div style="padding:var(--space-1) var(--space-3);display:flex;align-items:center;gap:var(--space-1);font-family:var(--font-sans);font-size:var(--font-size-xs);color:var(--content-tertiary);">
            <span style="cursor:pointer;color:var(--primary-outline-fg);">Settings</span>
            <span>&#8250;</span>
            <span>Notifications</span>
          </div>` : '';

          return `<div class="ds-cmd-backdrop">
            <div class="ds-cmd-palette">
              <div style="position:relative;display:flex;align-items:center;">
                <span class="ds-cmd-search-icon" style="position:absolute;inset-inline-start:var(--space-4);color:var(--content-tertiary);">${ICONS.search}</span>
                <input class="ds-cmd-input" placeholder="${config.mode === 'command' ? 'Type a command...' : 'Search pages, actions, settings...'}" style="padding-inline-start:var(--space-10);" />
              </div>
              ${nestedBreadcrumb}
              <div class="ds-cmd-results">
                ${resultItems}
                ${emptyState}
                ${loadingState}
              </div>
              <div class="ds-cmd-footer">
                <span>&#8593;&#8595; Navigate</span>
                <span>&#9166; Open</span>
                <span>Esc Close</span>
              </div>
            </div>
          </div>`;
        },
        tokens: (config) => ({
          'surface-raised': '--surface-raised',
          'shadow-xl': '--shadow-xl',
          'surface-default': '--surface-default',
          'primary-tonal-bg': '--primary-tonal-bg',
          'content-primary': '--content-primary',
          'content-secondary': '--content-secondary',
          'content-tertiary': '--content-tertiary',
          'border-subtle': '--border-subtle',
          'space-3': '--space-3',
          'radius-xl': '--radius-xl',
          'radius-md': '--radius-md',
          'motion-fast': '--motion-fast',
          'ease-enter': '--ease-enter',
          ...(config.state === 'empty' ? {} : {}),
        }),
      },

      'notification-center': {
        name: 'Notification Center',
        description: 'Centralized notification inbox panel with categorization and actions',
        controls: {
          tab: ['all', 'unread', 'mentions', 'system'],
          state: ['default', 'empty'],
          withActions: ['yes', 'no'],
        },
        defaults: { tab: 'all', state: 'default', withActions: 'yes' },
        render: (config) => {
          const isEmpty = config.state === 'empty';

          const notifications = [
            { type: 'info', unread: true, title: 'New team member joined', desc: 'Sarah Ahmed has been added to the Customer Success team. Welcome her!', time: '5 min ago', avatar: 'SA' },
            { type: 'success', unread: true, title: 'Report generated successfully', desc: 'Your monthly analytics report for February is ready to download.', time: '1 hour ago', avatar: '&#10003;' },
            { type: 'warning', unread: false, title: 'Storage limit approaching', desc: 'Your workspace has used 85% of available storage. Consider upgrading.', time: '3 hours ago', avatar: '&#9888;' },
            { type: 'error', unread: false, title: 'Integration sync failed', desc: 'Salesforce data sync encountered an error. Please check your API credentials.', time: 'Yesterday', avatar: '&#10007;' },
          ];

          const filteredNotifs = config.tab === 'unread' ? notifications.filter(n => n.unread) :
            config.tab === 'mentions' ? [notifications[0]] :
            config.tab === 'system' ? [notifications[2], notifications[3]] : notifications;

          const notifItems = isEmpty ? `<div class="ds-notif-empty">
            <div style="font-size:var(--font-size-xl);margin-bottom:var(--space-2);">&#128276;</div>
            <div>No notifications yet</div>
            <div style="font-size:var(--font-size-xs);margin-top:var(--space-1);">You're all caught up!</div>
          </div>` : filteredNotifs.map(n => `
            <div class="ds-notif-item ${n.type}${n.unread ? ' unread' : ''}" tabindex="0">
              <div class="ds-notif-item-avatar" style="width:36px;height:36px;border-radius:var(--radius-full);background:var(--${n.type === 'info' ? 'primary' : n.type === 'success' ? 'success' : n.type === 'warning' ? 'warning' : 'danger'}-tonal-bg);color:var(--${n.type === 'info' ? 'primary' : n.type === 'success' ? 'success' : n.type === 'warning' ? 'warning' : 'danger'}-tonal-fg);display:flex;align-items:center;justify-content:center;font-family:var(--font-sans);font-size:var(--font-size-xs);flex-shrink:0;">${n.avatar}</div>
              <div class="ds-notif-content">
                <div class="ds-notif-item-title${n.unread ? ' unread' : ''}">${n.title}</div>
                <div class="ds-notif-item-desc">${n.desc}</div>
                <div class="ds-notif-item-time">${n.time}</div>
                ${config.withActions === 'yes' ? `<div class="ds-notif-item-actions">
                  <button class="ds-notif-action-btn">View</button>
                  <button class="ds-notif-action-btn">Dismiss</button>
                </div>` : ''}
              </div>
              ${n.unread ? '<div class="ds-notif-dot"></div>' : ''}
            </div>
          `).join('');

          const tabs = ['all', 'unread', 'mentions', 'system'];

          return `<div style="display:inline-flex;gap:var(--space-4);align-items:flex-start;position:relative;">
            <div class="ds-notif-trigger" tabindex="0">
              <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
              <span class="ds-notif-badge">3</span>
            </div>
            <div class="ds-notif-panel">
              <div class="ds-notif-header">
                <span class="ds-notif-title">Notifications</span>
                <button class="ds-notif-mark-read">Mark all read</button>
              </div>
              <div class="ds-notif-tabs">
                ${tabs.map(t => `<button class="ds-notif-tab${config.tab === t ? ' active' : ''}">${t.charAt(0).toUpperCase() + t.slice(1)}</button>`).join('')}
              </div>
              <div class="ds-notif-items">
                <div class="ds-notif-group">Today</div>
                ${notifItems}
              </div>
              <div class="ds-notif-footer">
                <a class="ds-notif-footer-link" href="#">View all notifications</a>
              </div>
            </div>
          </div>`;
        },
        tokens: (config) => ({
          'surface-raised': '--surface-raised',
          'shadow-lg': '--shadow-lg',
          'surface-sunken': '--surface-sunken',
          'primary-filled-bg': '--primary-filled-bg',
          'primary-filled-fg': '--primary-filled-fg',
          'content-primary': '--content-primary',
          'content-secondary': '--content-secondary',
          'content-tertiary': '--content-tertiary',
          'border-subtle': '--border-subtle',
          'space-3': '--space-3',
          'radius-lg': '--radius-lg',
          'danger-outline-border': '--danger-outline-border',
          'warning-outline-border': '--warning-outline-border',
          'success-outline-border': '--success-outline-border',
          'primary-outline-border': '--primary-outline-border',
          'neutral-tonal-bg': '--neutral-tonal-bg',
        }),
      },

      'search': {
        name: 'Search',
        description: 'Contextual search with filters, suggestions, and results display',
        controls: {
          display: ['suggestions', 'results', 'no-results'],
          withFilters: ['yes', 'no'],
          state: ['default', 'focused', 'disabled'],
        },
        defaults: { display: 'suggestions', withFilters: 'no', state: 'default' },
        render: (config) => {
          const isFocused = config.state === 'focused';
          const isDisabled = config.state === 'disabled';
          const disClass = isDisabled ? ' disabled' : '';
          const focusClass = isFocused ? ' focused' : '';

          const suggestions = config.display === 'suggestions' ? `<div class="ds-search-dropdown">
            <div class="ds-search-category">Recent</div>
            <div class="ds-search-suggestion active" tabindex="0"><span class="ds-search-suggestion-icon">${ICONS.clock}</span><span class="ds-search-suggestion-label">Customer satisfaction report</span></div>
            <div class="ds-search-suggestion" tabindex="0"><span class="ds-search-suggestion-icon">${ICONS.clock}</span><span class="ds-search-suggestion-label">Monthly revenue analysis</span></div>
            <div class="ds-search-category">Popular</div>
            <div class="ds-search-suggestion" tabindex="0"><span class="ds-search-suggestion-icon">${ICONS.search}</span><span class="ds-search-suggestion-label">Team performance dashboard</span></div>
            <div class="ds-search-suggestion" tabindex="0"><span class="ds-search-suggestion-icon">${ICONS.search}</span><span class="ds-search-suggestion-label">Invoice management</span></div>
          </div>` : '';

          const filters = config.withFilters === 'yes' ? `<div class="ds-search-filters">
            <span class="ds-search-filter-chip">Date: Last 30 days <span style="margin-inline-start:var(--space-1);cursor:pointer;">&#10005;</span></span>
            <span class="ds-search-filter-chip">Type: Reports <span style="margin-inline-start:var(--space-1);cursor:pointer;">&#10005;</span></span>
          </div>` : '';

          const results = config.display === 'results' ? `<div class="ds-search-results">
            <div class="ds-search-result" tabindex="0">
              <div class="ds-search-result-title">Customer <span class="ds-search-match">Satisfaction</span> Report - February</div>
              <div class="ds-search-result-snippet">Monthly analysis of customer <span class="ds-search-match">satisfaction</span> scores across all channels including live chat, email support...</div>
              <div class="ds-search-result-meta">Reports &middot; Updated 2 days ago</div>
            </div>
            <div class="ds-search-result" tabindex="0">
              <div class="ds-search-result-title">Employee <span class="ds-search-match">Satisfaction</span> Survey Results</div>
              <div class="ds-search-result-snippet">Internal survey measuring team <span class="ds-search-match">satisfaction</span> and engagement levels for Q4...</div>
              <div class="ds-search-result-meta">HR &middot; Updated 1 week ago</div>
            </div>
            <div class="ds-search-result" tabindex="0">
              <div class="ds-search-result-title"><span class="ds-search-match">Satisfaction</span> Metrics Dashboard</div>
              <div class="ds-search-result-snippet">Real-time dashboard tracking NPS, CSAT, and CES scores with historical trends...</div>
              <div class="ds-search-result-meta">Analytics &middot; Updated today</div>
            </div>
          </div>` : '';

          const noResults = config.display === 'no-results' ? `<div class="ds-search-empty">
            <div style="font-size:var(--font-size-xl);margin-bottom:var(--space-2);">&#128269;</div>
            <div>No results found for "xyzabc123"</div>
            <div style="font-size:var(--font-size-xs);margin-top:var(--space-1);">Try different keywords or check your spelling</div>
          </div>` : '';

          return `<div class="ds-search${disClass}">
            <div class="ds-search-bar${focusClass}${disClass}">
              <span class="ds-search-icon">${ICONS.search}</span>
              <input class="ds-search-input" placeholder="Search..." ${isDisabled ? 'disabled' : ''} value="${config.display !== 'suggestions' ? 'satisfaction' : ''}" />
              ${config.display !== 'suggestions' ? '<button class="ds-search-clear has-value" title="Clear">&#10005;</button>' : '<button class="ds-search-clear" title="Clear">&#10005;</button>'}
            </div>
            ${suggestions}
            ${filters}
            ${results}
            ${noResults}
          </div>`;
        },
        tokens: (config) => ({
          'surface-default': '--surface-default',
          'surface-raised': '--surface-raised',
          'shadow-md': '--shadow-md',
          'primary-filled-bg': '--primary-filled-bg',
          'content-primary': '--content-primary',
          'content-secondary': '--content-secondary',
          'content-tertiary': '--content-tertiary',
          'border-subtle': '--border-subtle',
          'space-3': '--space-3',
          'radius-lg': '--radius-lg',
          'radius-md': '--radius-md',
          'neutral-tonal-bg': '--neutral-tonal-bg',
          ...(config.state === 'disabled' ? { 'content-disabled': '--content-disabled' } : {}),
        }),
      },

      'empty-states': {
        name: 'Empty States',
        description: 'Placeholder displays for views with no data or content',
        controls: {
          type: ['no-data', 'no-results', 'error', 'permission'],
          size: ['full-page', 'inline', 'compact'],
        },
        defaults: { type: 'no-data', size: 'full-page' },
        render: (config) => {
          const sizeClass = config.size === 'compact' ? ' compact' : config.size === 'inline' ? ' inline' : '';
          const typeClass = config.type === 'error' ? ' error' : config.type === 'permission' ? ' permission' : '';
          const iconSize = config.size === 'compact' ? '32' : '48';

          const icons = {
            'no-data': `<svg width="${iconSize}" height="${iconSize}" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="9" y1="9" x2="15" y2="15"/><line x1="15" y1="9" x2="9" y2="15"/></svg>`,
            'no-results': `<svg width="${iconSize}" height="${iconSize}" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/><line x1="8" y1="11" x2="14" y2="11"/></svg>`,
            'error': `<svg width="${iconSize}" height="${iconSize}" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>`,
            'permission': `<svg width="${iconSize}" height="${iconSize}" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>`,
          };

          const titles = {
            'no-data': 'No data yet',
            'no-results': 'No results found',
            'error': 'Something went wrong',
            'permission': 'Access restricted',
          };

          const descriptions = {
            'no-data': 'Get started by creating your first item. It only takes a moment to set up.',
            'no-results': 'Try adjusting your search or filters to find what you are looking for.',
            'error': 'We encountered an error loading this content. Please try again.',
            'permission': 'You do not have permission to access this resource. Contact your administrator.',
          };

          const actions = {
            'no-data': 'Create First Item',
            'no-results': 'Clear Filters',
            'error': 'Try Again',
            'permission': 'Request Access',
          };

          return `<div class="ds-empty-state${sizeClass}${typeClass}">
            <div class="ds-empty-illustration">
              <span class="ds-empty-icon">${icons[config.type]}</span>
            </div>
            <div class="ds-empty-title">${titles[config.type]}</div>
            <div class="ds-empty-description">${descriptions[config.type]}</div>
            <button class="ds-empty-action">${actions[config.type]}</button>
            ${config.type !== 'error' ? '<a class="ds-empty-secondary" href="#">Learn more</a>' : ''}
          </div>`;
        },
        tokens: (config) => ({
          'surface-default': '--surface-default',
          'content-secondary': '--content-secondary',
          'content-tertiary': '--content-tertiary',
          'primary-filled-bg': '--primary-filled-bg',
          'primary-filled-fg': '--primary-filled-fg',
          'neutral-tonal-bg': '--neutral-tonal-bg',
          'space-3': '--space-3',
          'space-5': '--space-5',
          'space-6': '--space-6',
          'radius-full': '--radius-full',
          'radius-md': '--radius-md',
          'primary-outline-fg': '--primary-outline-fg',
          ...(config.type === 'error' ? { 'danger-outline-fg': '--danger-outline-fg', 'danger-tonal-bg': '--danger-tonal-bg' } : {}),
        }),
      },
    };

    // Expose ICONS globally for Wave 2 components
    window.__DS_ICONS = ICONS;

    /* ============================================================
       STATE MANAGEMENT
       ============================================================ */
    let currentComponent = 'button';
    let currentConfig = { ...COMPONENTS.button.defaults };

    const app = document.getElementById('app');
    const controlPanel = document.getElementById('controlPanel');
    const preview = document.getElementById('preview');
    const specs = document.getElementById('specs');

    /* ============================================================
       UTILITY FUNCTIONS
       ============================================================ */
    function resolveToken(tokenName) {
      const computed = getComputedStyle(app);
      return computed.getPropertyValue(tokenName).trim();
    }

    function updateUI() {
      const component = COMPONENTS[currentComponent];

      // Update header
      document.querySelector('.component-name').textContent = component.name;
      document.querySelector('.component-description').textContent = component.description;

      // Update control panel
      controlPanel.innerHTML = '';
      for (const [key, values] of Object.entries(component.controls)) {
        const group = document.createElement('div');
        group.className = 'control-group-vertical';

        const label = document.createElement('label');
        label.textContent = key.charAt(0).toUpperCase() + key.slice(1);
        group.appendChild(label);

        const segmented = document.createElement('div');
        segmented.className = 'segmented-group';

        values.forEach(value => {
          const btn = document.createElement('button');
          btn.className = 'segmented-btn';
          btn.textContent = value.charAt(0).toUpperCase() + value.slice(1);
          btn.dataset.key = key;
          btn.dataset.value = value;

          if (currentConfig[key] === value) {
            btn.classList.add('active');
          }

          btn.addEventListener('click', () => {
            currentConfig[key] = value;
            updateUI();
          });

          segmented.appendChild(btn);
        });

        group.appendChild(segmented);
        controlPanel.appendChild(group);
      }

      // Update preview
      preview.innerHTML = component.render(currentConfig);

      // Update specs
      const tokenMap = component.tokens(currentConfig);
      specs.innerHTML = '';
      for (const [key, tokenVar] of Object.entries(tokenMap)) {
        const item = document.createElement('div');
        item.className = 'specs-item';

        const keyEl = document.createElement('div');
        keyEl.className = 'specs-key';
        keyEl.textContent = tokenVar;

        const valueEl = document.createElement('div');
        valueEl.className = 'specs-value';

        const resolved = resolveToken(tokenVar);
        if (resolved.startsWith('#')) {
          const swatch = document.createElement('div');
          swatch.className = 'specs-swatch';
          swatch.style.backgroundColor = resolved;
          valueEl.appendChild(swatch);
        }
        valueEl.appendChild(document.createTextNode(resolved));

        item.appendChild(keyEl);
        item.appendChild(valueEl);
        specs.appendChild(item);
      }

      // Update top bar
      const name = document.querySelector('.component-name');
      const desc = document.querySelector('.component-description');
      name.textContent = component.name;
      desc.textContent = component.description;
    }

    /* ============================================================
       EVENT LISTENERS
       ============================================================ */

    // Global switch state
    const globalState = { brand: 'hulul', theme: 'light', direction: 'ltr', viewport: 'desktop' };

    function toggleSwitch(id, stateKey, offVal, onVal, offLabel, onLabel) {
      const el = document.getElementById(id);
      const track = el.querySelector('.global-switch-track');
      const valueEl = document.getElementById(stateKey + 'Value') || el.querySelector('.global-switch-value');
      el.addEventListener('click', () => {
        const isOn = track.classList.toggle('on');
        globalState[stateKey] = isOn ? onVal : offVal;
        valueEl.textContent = isOn ? onLabel : offLabel;
        applyGlobalState();
      });
    }

    function applyGlobalState() {
      app.setAttribute('data-brand', globalState.brand);
      app.setAttribute('data-theme', globalState.theme);
      app.setAttribute('dir', globalState.direction);
      app.setAttribute('data-viewport', globalState.viewport);
      updateUI();
    }

    toggleSwitch('switchBrand', 'brand', 'hulul', 'widebot', 'Hulul', 'WideBot');
    toggleSwitch('switchTheme', 'theme', 'light', 'dark', 'Light', 'Dark');
    toggleSwitch('switchDirection', 'direction', 'ltr', 'rtl', 'LTR', 'RTL');
    toggleSwitch('switchViewport', 'viewport', 'desktop', 'mobile', 'Desktop', 'Mobile');

    // Navigation
    document.querySelectorAll('.nav-item').forEach(item => {
      item.addEventListener('click', () => {
        document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
        item.classList.add('active');
        currentComponent = item.dataset.component;
        currentConfig = { ...COMPONENTS[currentComponent].defaults };
        updateUI();
      });
    });

    // Section toggle
    document.querySelectorAll('.nav-section-header').forEach(header => {
      header.addEventListener('click', function() {
        const section = this.parentElement;
        section.classList.toggle('collapsed');
      });
    });

    // Specs panel toggle
    document.querySelector('.specs-header').addEventListener('click', () => {
      const toggle = document.querySelector('.specs-toggle');
      const list = document.querySelector('.specs-list');
      toggle.classList.toggle('collapsed');
      list.style.display = toggle.classList.contains('collapsed') ? 'none' : 'grid';
    });

    // Initial render
    updateUI();
  </script>
</body>
</html>

    .ds-file-upload-item-remove .material-symbols-rounded { font-size: 14px; }

    /* PAGINATION */
    .ds-pagination {
      display: flex;
      align-items: center;
      gap: var(--space-1);
      font-family: var(--font-sans);
    }
    .ds-pagination-btn {
      min-width: 36px; height: 36px;
      border: none; background: none;
      border-radius: var(--radius-sm);
      font-family: var(--font-sans);
      font-size: var(--font-size-sm);
      color: var(--content-primary);
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background-color var(--motion-fast) var(--ease-standard);
      padding: 0 var(--space-1);
    }
    .ds-pagination-btn:hover { background-color: var(--neutral-tonal-bg); }
    .ds-pagination-btn.active {
      background-color: var(--primary-filled-bg);
      color: var(--primary-filled-fg);
      font-weight: var(--font-weight-semibold);
    }
    .ds-pagination-btn.active:hover { background-color: var(--primary-filled-bg); }
    .ds-pagination-btn:focus-visible { outline: none; box-shadow: 0 0 0 2px var(--primary-filled-bg); }
    .ds-pagination-btn:disabled {
      color: var(--content-disabled);
      cursor: not-allowed;
    }
    .ds-pagination-btn:disabled:hover { background: none; }
    .ds-pagination-btn svg { width: 18px; height: 18px; }

    .ds-pagination-btn .material-symbols-rounded { font-size: 18px; }

    .ds-pagination-ellipsis {
      min-width: 36px; height: 36px;
      display: flex; align-items: center; justify-content: center;
      color: var(--content-tertiary);
      font-size: var(--font-size-sm);
    }
    .ds-pagination-info {
      font-family: var(--font-sans);
      font-size: var(--font-size-sm);
      color: var(--content-secondary);
      white-space: nowrap;
      margin-inline-start: var(--space-3);
    }

    /* STEPPER */
    .ds-stepper {
      display: flex;
      width: 100%;
    }
    .ds-stepper.horizontal { flex-direction: row; align-items: flex-start; }
    .ds-stepper.vertical { flex-direction: column; gap: var(--space-4); }

    .ds-stepper-step {
      display: flex;
      align-items: flex-start;
      flex: 1;
      position: relative;
    }
    .ds-stepper.horizontal .ds-stepper-step { flex-direction: column; align-items: center; text-align: center; }
    .ds-stepper.vertical .ds-stepper-step { flex-direction: row; gap: var(--space-3); }

    .ds-stepper-circle {
      width: 32px; height: 32px;
      border-radius: var(--radius-full);
      display: flex; align-items: center; justify-content: center;
      font-family: var(--font-sans);
      font-size: var(--font-size-sm);
      font-weight: var(--font-weight-semibold);
      flex-shrink: 0;
      position: relative;
      z-index: 1;
      transition: all var(--motion-fast) var(--ease-standard);
    }
    .ds-stepper-circle.completed {
      background-color: var(--primary-filled-bg);
      color: var(--primary-filled-fg);
    }
    .ds-stepper-circle.active {
      background-color: var(--primary-filled-bg);
      color: var(--primary-filled-fg);
      box-shadow: 0 0 0 4px color-mix(in srgb, var(--primary-filled-bg) 20%, transparent);
    }
    .ds-stepper-circle:focus-visible { outline: none; box-shadow: 0 0 0 2px var(--surface-default), 0 0 0 4px var(--primary-filled-bg); }
    .ds-stepper-circle.upcoming {
      background-color: var(--surface-default);
      color: var(--content-tertiary);
      box-shadow: inset 0 0 0 2px var(--border-default);
    }
    .ds-stepper-circle.error {
      background-color: var(--danger-filled-bg);
      color: var(--danger-filled-fg);
    }
    .ds-stepper-circle svg { width: 16px; height: 16px; }

    .ds-stepper-circle .material-symbols-rounded { font-size: 16px; }

    .ds-stepper-content {
      display: flex;
      flex-direction: column;
      gap: var(--space-0-5);
    }
    .ds-stepper.horizontal .ds-stepper-content { margin-top: var(--space-2); }

    .ds-stepper-label {
      font-family: var(--font-sans);
      font-size: var(--font-size-sm);
      font-weight: var(--font-weight-medium);
      color: var(--content-primary);
    }
    .ds-stepper-step.upcoming-step .ds-stepper-label { color: var(--content-tertiary); }

    .ds-stepper-desc {
      font-family: var(--font-sans);
      font-size: var(--font-size-xs);
      color: var(--content-tertiary);
    }

    .ds-stepper-line {
      position: absolute;
      background-color: var(--border-default);
    }
    .ds-stepper-line.filled { background-color: var(--primary-filled-bg); }
    .ds-stepper.horizontal .ds-stepper-line {
      top: 16px;
      inset-inline-start: calc(50% + 20px);
      inset-inline-end: calc(-50% + 20px);
      height: 2px;
    }
    .ds-stepper.vertical .ds-stepper-line {
      inset-inline-start: 15px;
      top: 36px;
      bottom: calc(-1 * var(--space-4) + 4px);
      width: 2px;
    }

    /* ============================================================
       SPRINT D: List, Accordion, Data Grid, Tree View, Timeline, Loading
       ============================================================ */

    /* LIST */
    .ds-list {
      display: flex;
      flex-direction: column;
      width: 100%;
      font-family: var(--font-sans);
    }
    .ds-list-item {
      display: flex;
      align-items: center;
      gap: var(--space-3);
      padding: var(--space-4) var(--space-4);
      position: relative;
      cursor: pointer;
      transition: background-color var(--motion-fast) var(--ease-standard);
    }
    .ds-list.compact .ds-list-item { padding: var(--space-3) var(--space-4); }
    .ds-list.comfortable .ds-list-item { padding: var(--space-5) var(--space-4); }
    .ds-list-item::before {
      content: ''; position: absolute; inset: 0; border-radius: var(--radius-md);
      background-color: currentColor; opacity: 0;
      transition: opacity var(--motion-fast) var(--ease-standard);
      pointer-events: none;
    }
    .ds-list-item:hover::before, .ds-list-item.hover::before { opacity: 0.06; }
    .ds-list-item:active::before, .ds-list-item.active::before { opacity: 0.1; }
    .ds-list-item:focus-visible { outline: none; box-shadow: inset 0 0 0 2px var(--primary-filled-bg); border-radius: var(--radius-md); }
    .ds-list-item.selected { background-color: var(--primary-tonal-bg); border-radius: var(--radius-md); }
    .ds-list-item.selected::before { opacity: 0; }
    .ds-list-item.disabled { cursor: not-allowed; }
    .ds-list-item.disabled::before { display: none; }
    .ds-list-item.disabled:hover::before, .ds-list-item.disabled.hover::before { opacity: 0; }

    .ds-list-item-leading {
      width: 40px; height: 40px;
      border-radius: var(--radius-full);
      flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      overflow: hidden;
    }
    .ds-list-item-leading img { width: 100%; height: 100%; object-fit: cover; }
    .ds-list-item-leading.icon {
      width: 40px; height: 40px;
      background-color: var(--primary-tonal-bg);
      color: var(--primary-tonal-fg);
    }
    .ds-list-item-leading svg { width: 20px; height: 20px; }

    .ds-list-item-leading .material-symbols-rounded { font-size: 20px; }

    .ds-list-item-content { flex: 1; min-width: 0; display: flex; flex-direction: column; gap: var(--space-0-5); }
    .ds-list-item-primary {
      font-family: var(--font-sans);
      font-size: var(--font-size-sm);
      font-weight: var(--font-weight-medium);
      color: var(--content-primary);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .ds-list-item-secondary {
      font-family: var(--font-sans);
      font-size: var(--font-size-xs);
      color: var(--content-secondary);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .ds-list-item-meta {
      font-family: var(--font-sans);
      font-size: var(--font-size-xs);
      color: var(--content-tertiary);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .ds-list-item.disabled .ds-list-item-primary,
    .ds-list-item.disabled .ds-list-item-secondary,
    .ds-list-item.disabled .ds-list-item-meta,
    .ds-list-item.disabled .ds-list-item-trailing,
    .ds-list-item.disabled .ds-list-item-leading { color: var(--content-disabled); }

    .ds-list-item-trailing {
      flex-shrink: 0;
      display: flex; align-items: center; gap: var(--space-2);
      color: var(--content-tertiary);
      font-family: var(--font-sans);
      font-size: var(--font-size-xs);
    }

    .ds-list-divider {
      height: 1px;
      background-color: var(--border-subtle);
      margin: 0;
    }
    .ds-list-divider.inset { margin-inline-start: 68px; }

    /* ACCORDION */
    .ds-accordion {
      display: flex;
      flex-direction: column;
      width: 100%;
      border-radius: var(--radius-lg);
      box-shadow: inset 0 0 0 1px var(--border-subtle);
      overflow: hidden;
    }
    .ds-accordion-item { box-shadow: inset 0 -1px 0 0 var(--border-subtle); }
    .ds-accordion-item:last-child { box-shadow: none; }

    .ds-accordion-header {
      display: flex;
      align-items: center;
      gap: var(--space-3);
      padding: var(--space-4);
      width: 100%;
      border: none; background: none;
      cursor: pointer;
      font-family: var(--font-sans);
      font-size: var(--font-size-sm);
      font-weight: var(--font-weight-medium);
      color: var(--content-primary);
      transition: background-color var(--motion-fast) var(--ease-standard);
      text-align: start;
    }
    .ds-accordion.compact .ds-accordion-header { padding: var(--space-3); }
    .ds-accordion.comfortable .ds-accordion-header { padding: var(--space-5); }
    .ds-accordion-header:hover, .ds-accordion-header.hover { background-color: var(--neutral-tonal-bg); }
    .ds-accordion-header:focus-visible { outline: none; box-shadow: inset 0 0 0 2px var(--primary-filled-bg); }
    .ds-accordion-header.disabled { color: var(--content-disabled); cursor: not-allowed; }
    .ds-accordion-header.disabled:hover, .ds-accordion-header.disabled.hover { background-color: transparent; }

    .ds-accordion-chevron {
      width: 18px; height: 18px;
      flex-shrink: 0;
      color: var(--content-tertiary);
      transition: transform var(--motion-standard) var(--ease-standard);
      margin-inline-start: auto;
    }
    .ds-accordion-chevron.expanded { transform: rotate(90deg); }
    [dir="rtl"] .ds-accordion-chevron { transform: rotate(180deg); }
    [dir="rtl"] .ds-accordion-chevron.expanded { transform: rotate(90deg); }
    .ds-accordion-header.disabled .ds-accordion-chevron { color: var(--content-disabled); }

    .ds-accordion-icon {
      width: 20px; height: 20px;
      flex-shrink: 0;
      color: var(--content-secondary);
    }
    .ds-accordion-icon svg { width: 100%; height: 100%; }

    .ds-accordion-icon .material-symbols-rounded { font-size: 100%; }

    .ds-accordion-header.disabled .ds-accordion-icon { color: var(--content-disabled); }
    .ds-accordion-header.disabled .ds-accordion-badge { color: var(--content-disabled); }

    .ds-accordion-badge {
      font-family: var(--font-sans);
      font-size: var(--font-size-xs);
      color: var(--content-tertiary);
      flex-shrink: 0;
    }

    .ds-accordion-body {
      padding: 0 var(--space-4) var(--space-4);
      font-family: var(--font-sans);
      font-size: var(--font-size-sm);
      color: var(--content-secondary);
      line-height: var(--line-height-normal);
    }
    .ds-accordion.compact .ds-accordion-body { padding: 0 var(--space-3) var(--space-3); }
    .ds-accordion.comfortable .ds-accordion-body { padding: 0 var(--space-5) var(--space-5); }

    /* DATA GRID */
    .ds-data-grid-wrapper {
      width: 100%;
      overflow-x: auto;
      border-radius: var(--radius-lg);
      box-shadow: inset 0 0 0 1px var(--border-subtle);
    }
    .ds-data-grid {
      width: 100%;
      border-collapse: collapse;
      font-family: var(--font-sans);
      font-size: var(--font-size-sm);
    }
    .ds-data-grid thead { background-color: var(--surface-sunken); }
    .ds-data-grid th {
      padding: var(--space-3) var(--space-3);
      font-family: var(--font-sans);
      font-size: var(--font-size-xs);
      font-weight: var(--font-weight-semibold);
      color: var(--content-secondary);
      text-align: start;
      white-space: nowrap;
      position: relative;
      user-select: none;
    }
    .ds-data-grid.compact th { padding: var(--space-2) var(--space-3); }
    .ds-data-grid.comfortable th { padding: var(--space-4) var(--space-3); }
    .ds-data-grid th.sortable { cursor: pointer; }
    .ds-data-grid th.sortable:hover, .ds-data-grid th.sortable.hover { color: var(--content-primary); }
    .ds-data-grid th .ds-sort-icon {
      display: inline-flex; width: 14px; height: 14px;
      margin-inline-start: var(--space-1);
      vertical-align: middle;
      opacity: 0.5;
    }
    .ds-data-grid th.sorted .ds-sort-icon { opacity: 1; color: var(--primary-filled-bg); }
    .ds-data-grid th.sorted { color: var(--primary-filled-bg); }

    .ds-data-grid td {
      padding: var(--space-3) var(--space-3);
      font-family: var(--font-sans);
      font-size: var(--font-size-sm);
      color: var(--content-primary);
      box-shadow: inset 0 1px 0 0 var(--border-subtle);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 200px;
    }
    .ds-data-grid.compact td { padding: var(--space-2) var(--space-3); }
    .ds-data-grid.comfortable td { padding: var(--space-4) var(--space-3); }
    .ds-data-grid td.secondary { color: var(--content-tertiary); }
    .ds-data-grid td.numeric { text-align: end; font-variant-numeric: tabular-nums; }

    .ds-data-grid tbody tr {
      transition: background-color var(--motion-fast) var(--ease-standard);
    }
    .ds-data-grid tbody tr:hover, .ds-data-grid tbody tr.hover { background-color: var(--neutral-tonal-bg); }
    .ds-data-grid tbody tr.selected { background-color: var(--primary-tonal-bg); }
    .ds-data-grid tbody tr.selected:hover { background-color: var(--primary-tonal-bg); }
    .ds-data-grid tbody tr.disabled { opacity: 0.5; cursor: not-allowed; }
    .ds-data-grid tbody tr.disabled td { color: var(--content-disabled); }
    .ds-data-grid tbody tr.disabled:hover, .ds-data-grid tbody tr.disabled.hover { background: none; }
    .ds-data-grid tbody tr:focus-visible { outline: none; box-shadow: inset 0 0 0 2px var(--primary-filled-bg); }

    .ds-data-grid-checkbox {
      width: 18px; height: 18px;
      border-radius: var(--radius-xs);
      box-shadow: inset 0 0 0 2px var(--border-default);
      background: none; border: none; cursor: pointer; padding: 0;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      transition: all var(--motion-fast) var(--ease-standard);
    }
    .ds-data-grid-checkbox.checked {
      background-color: var(--primary-filled-bg);
      box-shadow: none;
      color: var(--primary-filled-fg);
    }
    .ds-data-grid-checkbox:hover, .ds-data-grid-checkbox.hover { box-shadow: inset 0 0 0 2px var(--primary-filled-bg); }
    .ds-data-grid-checkbox:focus-visible { outline: none; box-shadow: 0 0 0 2px var(--primary-filled-bg); }
    .ds-data-grid-checkbox svg { width: 12px; height: 12px; }

    .ds-data-grid-checkbox .material-symbols-rounded { font-size: 12px; }

    .ds-data-grid-actions {
      display: flex; gap: var(--space-1); align-items: center;
    }
    .ds-data-grid-action-btn {
      width: 28px; height: 28px;
      border: none; background: none; border-radius: var(--radius-sm);
      color: var(--content-tertiary); cursor: pointer; padding: 0;
      display: flex; align-items: center; justify-content: center;
      transition: all var(--motion-fast) var(--ease-standard);
    }
    .ds-data-grid-action-btn:hover, .ds-data-grid-action-btn.hover { background-color: var(--neutral-tonal-bg); color: var(--content-primary); }
    .ds-data-grid-action-btn:focus-visible { outline: none; box-shadow: 0 0 0 2px var(--primary-filled-bg); }
    .ds-data-grid-action-btn svg { width: 16px; height: 16px; }

    .ds-data-grid-action-btn .material-symbols-rounded { font-size: 16px; }

    .ds-data-grid-empty {
      padding: var(--space-8);
      text-align: center;
      color: var(--content-tertiary);
      font-family: var(--font-sans);
      font-size: var(--font-size-sm);
    }

    .ds-data-grid-status-chip {
      display: inline-flex; align-items: center;
      padding: var(--space-0-5) var(--space-2);
      border-radius: var(--radius-full);
      font-family: var(--font-sans);
      font-size: var(--font-size-xs);
      font-weight: var(--font-weight-medium);
    }
    .ds-data-grid-status-chip.success { background-color: var(--success-tonal-bg); color: var(--success-tonal-fg); }
    .ds-data-grid-status-chip.warning { background-color: var(--warning-tonal-bg); color: var(--warning-tonal-fg); }
    .ds-data-grid-status-chip.danger { background-color: var(--danger-tonal-bg); color: var(--danger-tonal-fg); }
    .ds-data-grid-status-chip.neutral { background-color: var(--neutral-tonal-bg); color: var(--neutral-tonal-fg); }

    /* TREE VIEW */
    .ds-tree {
      display: flex;
      flex-direction: column;
      width: 100%;
      font-family: var(--font-sans);
    }
    .ds-tree-node {
      display: flex;
      align-items: center;
      gap: var(--space-2);
      padding: var(--space-2) var(--space-3);
      cursor: pointer;
      border-radius: var(--radius-md);
      transition: background-color var(--motion-fast) var(--ease-standard);
      position: relative;
    }
    .ds-tree-node:hover, .ds-tree-node.hover { background-color: var(--neutral-tonal-bg); }
    .ds-tree-node:focus-visible { outline: none; box-shadow: inset 0 0 0 2px var(--primary-filled-bg); }
    .ds-tree-node.selected { background-color: var(--primary-tonal-bg); }
    .ds-tree-node.disabled { cursor: not-allowed; }
    .ds-tree-node.disabled:hover, .ds-tree-node.disabled.hover { background-color: transparent; }
    .ds-tree-node.disabled .ds-tree-label { color: var(--content-disabled); }
    .ds-tree-node.disabled .ds-tree-icon { color: var(--content-disabled); }
    .ds-tree-node.disabled .ds-tree-badge { color: var(--content-disabled); }
    .ds-tree-node.disabled .ds-tree-expand { color: var(--content-disabled); }

    .ds-tree-indent { flex-shrink: 0; }

    .ds-tree-expand {
      width: 20px; height: 20px;
      border: none; background: none; padding: 0;
      color: var(--content-tertiary); cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      transition: transform var(--motion-fast) var(--ease-standard);
      border-radius: var(--radius-xs);
    }
    .ds-tree-expand:hover, .ds-tree-expand.hover { color: var(--content-primary); }
    .ds-tree-expand:focus-visible { outline: none; box-shadow: 0 0 0 2px var(--primary-filled-bg); }
    .ds-tree-expand.expanded { transform: rotate(90deg); }
    [dir="rtl"] .ds-tree-expand { transform: rotate(180deg); }
    [dir="rtl"] .ds-tree-expand.expanded { transform: rotate(90deg); }

    /* RTL: Breadcrumb separator chevrons */
    [dir="rtl"] .ds-breadcrumb-separator { transform: scaleX(-1); }

    /* RTL: Pagination chevrons */
    [dir="rtl"] .ds-pagination-btn svg,
    [dir="rtl"] .ds-pagination-btn .material-symbols-rounded { transform: scaleX(-1); }

    /* RTL: Date picker nav chevrons */
    [dir="rtl"] .ds-datepicker-nav-btn svg,
    [dir="rtl"] .ds-datepicker-nav-btn .material-symbols-rounded { transform: scaleX(-1); }

    /* RTL: Sort icon in data grid */
    [dir="rtl"] .ds-sort-icon { transform: scaleX(-1); }

    /* RTL: Timeline alignment handled by logical properties (inset-inline-start) */

    .ds-tree-expand svg { width: 14px; height: 14px; }

    .ds-tree-expand .material-symbols-rounded { font-size: 14px; }

    .ds-tree-icon {
      width: 18px; height: 18px;
      flex-shrink: 0;
      color: var(--content-secondary);
    }
    .ds-tree-icon svg { width: 100%; height: 100%; }

    .ds-tree-icon .material-symbols-rounded { font-size: 100%; }

    .ds-tree-node.selected .ds-tree-icon { color: var(--primary-tonal-fg); }

    .ds-tree-label {
      font-family: var(--font-sans);
      font-size: var(--font-size-sm);
      color: var(--content-primary);
      flex: 1; min-width: 0;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .ds-tree-node.disabled .ds-tree-label { color: var(--content-disabled); }

    .ds-tree-badge {
      font-family: var(--font-sans);
      font-size: var(--font-size-xs);
      color: var(--content-tertiary);
      flex-shrink: 0;
    }

    .ds-tree-children {
      display: flex;
      flex-direction: column;
      padding-inline-start: var(--space-6);
      position: relative;
    }
    .ds-tree-children::before {
      content: '';
      position: absolute;
      inset-inline-start: calc(var(--space-3) + 9px);
      top: 0; bottom: var(--space-4);
      width: 1px;
      background-color: var(--border-subtle);
    }

    /* TIMELINE */
    .ds-timeline {
      display: flex;
      flex-direction: column;
      gap: 0;
      position: relative;
      font-family: var(--font-sans);
    }

    /* Continuous line via ::before on container */
    .ds-timeline::before {
      content: '';
      position: absolute;
      inset-inline-start: 15px;
      top: 16px;
      bottom: 16px;
      width: 2px;
      background-color: var(--border-default);
    }

    .ds-timeline-item {
      display: flex;
      gap: var(--space-4);
      position: relative;
      padding-bottom: var(--space-6);
    }
    .ds-timeline-item:last-child { padding-bottom: 0; }
    .ds-timeline-item:focus-visible { outline: none; box-shadow: inset 0 0 0 2px var(--primary-filled-bg); border-radius: var(--radius-md); }

    /* Per-item colored line overlay (completed segments) */
    .ds-timeline-item.line-filled::after {
      content: '';
      position: absolute;
      inset-inline-start: 15px;
      top: 16px;
      bottom: 0;
      width: 2px;
      background-color: var(--success-filled-bg);
      z-index: 0;
    }

    .ds-timeline-node-col {
      display: flex;
      flex-direction: column;
      align-items: center;
      flex-shrink: 0;
      width: 32px;
      position: relative;
    }
    .ds-timeline-node {
      width: 32px; height: 32px;
      border-radius: var(--radius-full);
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      z-index: 1;
      font-family: var(--font-sans);
      font-size: var(--font-size-xs);
      font-weight: var(--font-weight-semibold);
    }
    .ds-timeline-node.completed { background-color: var(--success-filled-bg); color: var(--success-filled-fg); }
    .ds-timeline-node.active { background-color: var(--primary-filled-bg); color: var(--primary-filled-fg); }
    .ds-timeline-node.error { background-color: var(--danger-filled-bg); color: var(--danger-filled-fg); }
    .ds-timeline-node.warning { background-color: var(--warning-filled-bg); color: var(--warning-filled-fg); }
    .ds-timeline-node.upcoming { background-color: var(--neutral-tonal-bg); color: var(--neutral-tonal-fg); }
    .ds-timeline-node svg { width: 16px; height: 16px; }

    .ds-timeline-node .material-symbols-rounded { font-size: 16px; }

    /* ALTERNATING layout: CSS Grid for perfect centering */
    .ds-timeline.alternating::before {
      inset-inline-start: calc(50% - 1px);
    }
    .ds-timeline.alternating .ds-timeline-item {
      display: grid;
      grid-template-columns: 1fr 32px 1fr;
      gap: var(--space-4);
      width: 100%;
    }
    .ds-timeline.alternating .ds-timeline-item.line-filled::after {
      inset-inline-start: calc(50% - 1px);
    }
    .ds-timeline.alternating .ds-timeline-node-col {
      grid-column: 2;
      grid-row: 1;
    }
    /* Odd items: content on the end side (column 3) */
    .ds-timeline.alternating .ds-timeline-item:nth-child(odd) .ds-timeline-content {
      grid-column: 3;
      grid-row: 1;
      text-align: start;
    }
    /* Even items: content on the start side (column 1) */
    .ds-timeline.alternating .ds-timeline-item:nth-child(even) .ds-timeline-content {
      grid-column: 1;
      grid-row: 1;
      text-align: end;
      display: flex;
      flex-direction: column;
      align-items: flex-end;
    }

    .ds-timeline-content {
      flex: 1; min-width: 0;
      padding-top: var(--space-1);
    }
    .ds-timeline-title {
      font-family: var(--font-sans);
      font-size: var(--font-size-sm);
      font-weight: var(--font-weight-medium);
      color: var(--content-primary);
    }
    .ds-timeline-desc {
      font-family: var(--font-sans);
      font-size: var(--font-size-xs);
      color: var(--content-secondary);
      margin-top: var(--space-1);
      line-height: var(--line-height-normal);
    }
    .ds-timeline-time {
      font-family: var(--font-sans);
      font-size: var(--font-size-xs);
      color: var(--content-tertiary);
      margin-top: var(--space-1);
    }

    /* LOADING */
    .ds-spinner {
      display: inline-flex;
      animation: ds-spin 1s linear infinite;
    }
    .ds-spinner.sm { width: 16px; height: 16px; }
    .ds-spinner.md { width: 24px; height: 24px; }
    .ds-spinner.lg { width: 40px; height: 40px; }
    .ds-spinner svg { width: 100%; height: 100%; }

    .ds-spinner .material-symbols-rounded { font-size: 100%; }

    .ds-spinner-track { stroke: var(--border-subtle); }
    .ds-spinner-fill { stroke: var(--primary-filled-bg); stroke-linecap: round; }

    @keyframes ds-spin { to { transform: rotate(360deg); } }

    .ds-progress-bar-wrapper {
      display: flex;
      flex-direction: column;
      gap: var(--space-1-5);
      width: 100%;
    }
    .ds-progress-bar-track {
      width: 100%; height: 6px;
      background-color: var(--border-subtle);
      border-radius: var(--radius-sm);
      overflow: hidden;
      position: relative;
    }
    .ds-progress-bar-fill {
      height: 100%;
      background-color: var(--primary-filled-bg);
      border-radius: var(--radius-sm);
      transition: width var(--motion-standard) var(--ease-standard);
    }
    .ds-progress-bar-fill.indeterminate {
      width: 40%;
      animation: ds-progress-indeterminate 1.5s var(--ease-standard) infinite;
    }
    @keyframes ds-progress-indeterminate {
      0% { inset-inline-start: -40%; }
      100% { inset-inline-start: 100%; }
    }
    .ds-progress-bar-fill.indeterminate { position: relative; }
    .ds-progress-bar-label {
      font-family: var(--font-sans);
      font-size: var(--font-size-xs);
      color: var(--content-tertiary);
      text-align: end;
    }

    .ds-skeleton {
      background-color: var(--surface-sunken);
      border-radius: var(--radius-md);
      animation: ds-skeleton-pulse 1.5s ease-in-out infinite;
      position: relative;
      overflow: hidden;
    }
    .ds-skeleton::after {
      content: '';
      position: absolute; inset: 0;
      background: linear-gradient(90deg, transparent, var(--neutral-tonal-bg), transparent);
      animation: ds-skeleton-shimmer 1.5s ease-in-out infinite;
    }
    @keyframes ds-skeleton-pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.6; }
    }
    @keyframes ds-skeleton-shimmer {
      0% { transform: translateX(-100%); }
      100% { transform: translateX(100%); }
    }
    .ds-skeleton.text { height: 14px; border-radius: var(--radius-xs); }
    .ds-skeleton.avatar { width: 40px; height: 40px; border-radius: var(--radius-full); }
    .ds-skeleton.card { width: 100%; height: 120px; }
    .ds-skeleton.row { width: 100%; height: 48px; }

    .ds-dots {
      display: inline-flex;
      gap: var(--space-1);
      align-items: center;
    }
    .ds-dot {
      width: 6px; height: 6px;
      border-radius: var(--radius-full);
      background-color: var(--content-tertiary);
      animation: ds-dot-bounce 1.2s ease-in-out infinite;
    }
    .ds-dot:nth-child(2) { animation-delay: 0.15s; }
    .ds-dot:nth-child(3) { animation-delay: 0.3s; }
    @keyframes ds-dot-bounce {
      0%, 80%, 100% { transform: translateY(0); }
      40% { transform: translateY(-6px); }
    }

    .ds-loading-overlay {
      display: flex;
      align-items: center;
      justify-content: center;
      background-color: color-mix(in srgb, var(--surface-default) 80%, transparent);
      border-radius: var(--radius-lg);
      padding: var(--space-8);
    }
    .ds-loading-overlay-label {
      font-family: var(--font-sans);
      font-size: var(--font-size-sm);
      color: var(--content-secondary);
      margin-top: var(--space-3);
    }

    @media (prefers-reduced-motion: reduce) {
      .ds-spinner { animation: none; opacity: 0.7; }
      .ds-skeleton { animation: none; }
      .ds-skeleton::after { animation: none; display: none; }
      .ds-dot { animation: none; }
      .ds-progress-bar-fill.indeterminate { animation: none; inset-inline-start: 30%; }
    }

    /* ============================================================
       SPRINT E: AI Chat, Command Palette, Notification Center,
       Search, Empty States
       ============================================================ */

    /* ============================================================
       1. AI CHAT (.ds-chat-*)
       ============================================================ */

    .ds-chat {
      display: flex;
      flex-direction: column;
      height: 100%;
      gap: var(--space-3);
    }

    .ds-chat.floating {
      position: absolute;
      width: 380px;
      height: 560px;
      border-radius: var(--radius-xl);
      box-shadow: var(--shadow-md);
      background-color: var(--surface-raised);
    }

    .ds-chat-header {
      display: flex;
      flex-direction: row;
      align-items: center;
      gap: var(--space-3);
      padding: var(--space-4);
      box-shadow: inset 0 -1px 0 0 var(--border-subtle);
    }

    .ds-chat-avatar {
      width: 32px;
      height: 32px;
      border-radius: var(--radius-full);
      flex-shrink: 0;
      background-color: var(--surface-default);
    }

    .ds-chat-header-content {
      flex: 1;
      min-width: 0;
    }

    .ds-chat-header-name {
      font-family: var(--font-sans);
      font-size: var(--font-size-sm);
      font-weight: var(--font-weight-semibold);
      color: var(--content-primary);
    }

    .ds-chat-header-status {
      font-family: var(--font-sans);
      font-size: var(--font-size-xs);
      color: var(--content-tertiary);
      margin-top: var(--space-1);
    }

    .ds-chat-header-menu {
      width: 32px;
      height: 32px;
      padding: var(--space-1);
      border-radius: var(--radius-md);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      position: relative;
      transition: background-color var(--motion-fast) var(--ease-standard);
    }

    .ds-chat-header-menu:hover,
    .ds-chat-header-menu.hover {
      background-color: color-mix(in srgb, var(--content-secondary) 8%, transparent);
    }

    .ds-chat-header-menu:focus-visible {
      box-shadow: 0 0 0 2px var(--primary-filled-bg);
    }

    .ds-chat-header-menu.disabled:hover,
    .ds-chat-header-menu.disabled.hover {
      background-color: transparent;
    }

    .ds-chat-messages {
      display: flex;
      flex-direction: column;
      gap: var(--space-3);
      overflow-y: auto;
      padding: var(--space-4);
      flex: 1;
    }

    .ds-chat-bubble {
      display: inline-flex;
      flex-direction: column;
      max-width: 75%;
      padding: var(--space-4);
      border-radius: var(--radius-lg);
      animation: ds-chat-fade-up var(--motion-standard) var(--ease-enter);
    }

    .ds-chat-bubble.user {
      margin-inline-start: auto;
      background-color: var(--primary-tonal-bg);
      color: var(--primary-tonal-fg);
    }

    .ds-chat-bubble.assistant {
      background-color: var(--surface-raised);
      color: var(--content-primary);
      box-shadow: inset 0 0 0 1px var(--border-subtle);
    }

    .ds-chat-bubble.system {
      text-align: center;
      background-color: transparent;
      color: var(--content-tertiary);
      max-width: 100%;
      align-self: center;
    }

    .ds-chat-text {
      font-family: var(--font-sans);
      font-size: var(--font-size-md);
      color: inherit;
      line-height: var(--line-height-normal);
      word-wrap: break-word;
    }

    .ds-chat-meta {
      font-family: var(--font-sans);
      font-size: var(--font-size-xs);
      color: var(--content-tertiary);
      margin-top: var(--space-1);
      text-align: end;
    }

    .ds-chat-bubble:hover .ds-chat-actions,

      background: none;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      color: var(--content-secondary);
      transition: background-color var(--motion-fast) var(--ease-standard);

    .ds-chat-code {

    .ds-chat-typing {

    .ds-chat-input-area {

      font-size: var(--font-size-sm);
      color: var(--content-primary);
      background-color: var(--surface-default);
      box-shadow: inset 0 0 0 1px var(--border-subtle);
      border: none;
      outline: none;
      resize: none;
      transition: box-shadow var(--motion-fast) var(--ease-standard);
    }

    .ds-chat-input:hover {
      box-shadow: inset 0 0 0 1px var(--border-default);
    }

    .ds-chat-input.hover {
      box-shadow: inset 0 0 0 1px var(--border-default);
    }

    .ds-chat-input:focus-visible {
      box-shadow: inset 0 0 0 2px var(--primary-filled-bg);
    }

    .ds-chat-input.focused {
      box-shadow: inset 0 0 0 2px var(--primary-filled-bg);
    }

    .ds-chat-input:disabled {
      color: var(--content-disabled);
      background-color: var(--surface-default);
    }

    .ds-chat-input.disabled {
      color: var(--content-disabled);
      background-color: var(--surface-default);
    }

    .ds-chat-input.disabled:hover,
    .ds-chat-input.disabled.hover {
      box-shadow: inset 0 0 0 1px var(--border-subtle);
    }

    .ds-chat-send-btn {
      width: 40px;
      height: 40px;
      padding: var(--space-2);
      border-radius: var(--radius-full);
      background-color: var(--primary-filled-bg);
      color: var(--primary-filled-fg);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      border: none;
      outline: none;
      transition: all var(--motion-fast) var(--ease-standard);
      position: relative;
    }

    .ds-chat-send-btn svg { width: 20px; height: 20px; }

    .ds-chat-send-btn .material-symbols-rounded { font-size: 20px; }

    .ds-chat-send-btn:hover,
    .ds-chat-send-btn.hover {
      background-color: color-mix(in srgb, var(--primary-filled-bg) 85%, var(--surface-default) 15%);
    }

    .ds-chat-send-btn:focus-visible {
      box-shadow: 0 0 0 2px var(--primary-filled-bg);
    }

    .ds-chat-send-btn:disabled {
      background-color: var(--surface-default);
      color: var(--content-disabled);
      cursor: not-allowed;
    }

    .ds-chat-send-btn.disabled {
      background-color: var(--surface-default);
      color: var(--content-disabled);
      cursor: not-allowed;
    }

    .ds-chat-send-btn.disabled:hover,
    .ds-chat-send-btn.disabled.hover {
      background-color: var(--surface-default);
    }

    .ds-chat-suggestions {
      display: flex;
      flex-direction: row;
      gap: var(--space-2);
      padding: var(--space-2);
      overflow-x: auto;

    .ds-chat-suggestion {
      display: inline-flex;
      align-items: center;
      padding: var(--space-2) var(--space-3);
      border-radius: var(--radius-full);
      background-color: var(--neutral-tonal-bg);

      font-family: var(--font-sans);
      font-size: var(--font-size-sm);
      cursor: pointer;
      border: none;
      outline: none;
      flex-shrink: 0;

    .ds-chat-suggestion:hover,
    .ds-chat-suggestion.hover {

    }

    .ds-chat-suggestion:focus-visible {
      box-shadow: 0 0 0 2px var(--primary-filled-bg);
    }

    /* ============================================================
       2. COMMAND PALETTE (.ds-cmd-*)
       ============================================================ */

    .ds-cmd-backdrop {
      position: absolute;
      inset: 0;
      background-color: color-mix(in srgb, var(--surface-default) 60%, transparent);
      z-index: 10;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding-top: 10%;
    }

    .ds-cmd-palette {
      position: relative;
      max-width: 640px;
      width: 90%;
      max-height: 60vh;
      background-color: var(--surface-raised);
      border-radius: var(--radius-xl);
      box-shadow: var(--shadow-xl);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      z-index: 101;
      animation: ds-cmd-enter var(--motion-fast) var(--ease-enter);
    }

    .ds-cmd-search-wrapper {
      position: relative;
      padding: var(--space-4);
      box-shadow: inset 0 -1px 0 0 var(--border-subtle);
    }

    .ds-cmd-search-icon {
      position: absolute;
      inset-inline-start: var(--space-4);
      top: 50%;
      transform: translateY(-50%);
      width: 20px;
      height: 20px;
      color: var(--content-tertiary);
      pointer-events: none;
    }

    .ds-cmd-input {
      width: 100%;
      padding-inline-start: 32px;
      padding-inline-end: var(--space-3);
      padding-block: var(--space-2);
      font-family: var(--font-sans);
      font-size: var(--font-size-lg);
      color: var(--content-primary);
      background-color: transparent;
      border: none;
      outline: none;
    }

    .ds-cmd-input::placeholder {
      color: var(--content-tertiary);
    }

    .ds-cmd-results {
      overflow-y: auto;
      flex: 1;
      padding: var(--space-2) 0;
    }

    .ds-cmd-category {
      padding: var(--space-2) var(--space-3);
      font-family: var(--font-sans);
      font-size: var(--font-size-xs);
      font-weight: var(--font-weight-medium);
      color: var(--content-tertiary);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .ds-cmd-item {
      display: flex;
      flex-direction: row;
      align-items: center;
      gap: var(--space-3);
      padding: var(--space-3);
      margin: 0 var(--space-2);
      border-radius: var(--radius-md);
      cursor: pointer;
      position: relative;
      transition: background-color var(--motion-fast) var(--ease-standard);
    }

    .ds-cmd-item:hover,
    .ds-cmd-item.hover {
      background-color: var(--surface-default);
    }

    .ds-cmd-item.active {
      background-color: var(--primary-tonal-bg);
    }

    .ds-cmd-item:focus-visible {
      box-shadow: 0 0 0 2px var(--primary-filled-bg);
    }

    .ds-cmd-item-icon {
      width: 20px;
      height: 20px;
      color: var(--content-secondary);
      flex-shrink: 0;
    }

    .ds-cmd-item-content {
      flex: 1;
      min-width: 0;
      display: flex;
      flex-direction: column;
      gap: var(--space-1);
    }

    .ds-cmd-item-label {
      font-family: var(--font-sans);
      font-size: var(--font-size-sm);
      color: var(--content-primary);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .ds-cmd-item-desc {
      font-family: var(--font-sans);
      font-size: var(--font-size-xs);
      color: var(--content-secondary);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .ds-cmd-item-shortcut {
      font-family: var(--font-mono);
      font-size: var(--font-size-xs);
      color: var(--content-tertiary);
      background-color: var(--surface-sunken);
      padding: var(--space-0-5) var(--space-1);
      border-radius: var(--radius-xs);
      flex-shrink: 0;
    }

    .ds-cmd-footer {
      padding: var(--space-2) var(--space-3);
      box-shadow: inset 0 1px 0 0 var(--border-subtle);
      font-family: var(--font-sans);
      font-size: var(--font-size-xs);
      color: var(--content-tertiary);
      display: flex;
      flex-direction: row;
      gap: var(--space-4);
    }

    .ds-cmd-empty {
      padding: var(--space-6);
      text-align: center;
      color: var(--content-tertiary);
      font-family: var(--font-sans);
      font-size: var(--font-size-sm);
    }

    /* ============================================================
       3. NOTIFICATION CENTER (.ds-notif-*)
       ============================================================ */

    .ds-notif-trigger {
      position: relative;
      width: 40px;
      height: 40px;
      padding: var(--space-2);
      border-radius: var(--radius-md);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      border: none;
      background-color: transparent;
      color: var(--content-primary);
      transition: background-color var(--motion-fast) var(--ease-standard);
    }

    .ds-notif-trigger:hover,
    .ds-notif-trigger.hover {
      background-color: color-mix(in srgb, var(--content-secondary) 8%, transparent);
    }

    .ds-notif-trigger:focus-visible {
      box-shadow: 0 0 0 2px var(--primary-filled-bg);
    }

    .ds-notif-badge {
      position: absolute;
      inset-inline-end: -4px;
      top: -4px;
      min-width: 18px;
      height: 18px;
      background-color: var(--primary-filled-bg);
      color: var(--primary-filled-fg);
      font-family: var(--font-sans);
      font-size: var(--font-size-xs);
      border-radius: var(--radius-full);
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: var(--font-weight-semibold);
    }

    .ds-notif-panel {
      position: absolute;
      top: 48px;
      inset-inline-end: 0;
      margin-top: var(--space-2);
      width: 400px;

      display: flex;
      flex-direction: row;
      align-items: center;
      justify-content: space-between;
      padding: var(--space-3) var(--space-4);
      box-shadow: inset 0 -1px 0 0 var(--border-subtle);
    }

    .ds-notif-title {
      font-family: var(--font-sans);
      font-size: var(--font-size-md);
      font-weight: var(--font-weight-semibold);
      color: var(--content-primary);
    }

    .ds-notif-mark-read {
      font-family: var(--font-sans);
      font-size: var(--font-size-sm);
      color: var(--primary-outline-fg);
      background-color: transparent;
      border: none;
      cursor: pointer;
      outline: none;
      transition: color var(--motion-fast) var(--ease-standard);
    }

    .ds-notif-mark-read:hover,
    .ds-notif-mark-read.hover {
      color: color-mix(in srgb, var(--primary-outline-fg) 80%, var(--surface-default) 20%);
    }

    .ds-notif-mark-read:focus-visible {
      box-shadow: 0 0 0 2px var(--primary-filled-bg);
    }

    .ds-notif-tabs {
      display: flex;
      flex-direction: row;
      box-shadow: inset 0 -1px 0 0 var(--border-subtle);
    }

    .ds-notif-tab {
      flex: 1;
      padding: var(--space-2);
      text-align: center;
      font-family: var(--font-sans);
      font-size: var(--font-size-sm);
      color: var(--content-secondary);
      cursor: pointer;
      border: none;
      background-color: transparent;
      outline: none;
      position: relative;
      transition: color var(--motion-fast) var(--ease-standard);
    }

    .ds-notif-tab:hover,
    .ds-notif-tab.hover {
      background-color: var(--neutral-tonal-bg);
    }

    .ds-notif-tab:focus-visible {
      outline: none;
      box-shadow: inset 0 0 0 2px var(--primary-filled-bg);
    }

    .ds-notif-tab.active {
      color: var(--primary-outline-fg);
    }

    .ds-notif-tab.active::after {
      content: '';
      position: absolute;
      bottom: -1px;
      inset-inline-start: 0;
      inset-inline-end: 0;
      height: 2px;
      background-color: var(--primary-outline-fg);
    }

    .ds-notif-items {
      overflow-y: auto;
      flex: 1;
    }

    .ds-notif-item {
      display: flex;
      flex-direction: row;
      align-items: flex-start;
      gap: var(--space-3);
      padding: var(--space-3) var(--space-4);
      position: relative;
      cursor: pointer;
      transition: background-color var(--motion-fast) var(--ease-standard);
    }

    .ds-notif-item:hover,
    .ds-notif-item.hover {
      background-color: var(--neutral-tonal-bg);
    }

    .ds-notif-item:focus-visible {
      box-shadow: inset 0 0 0 2px var(--primary-filled-bg);
    }

    .ds-notif-item.unread {
      background-color: var(--surface-sunken);
    }

    .ds-notif-item.info {
      box-shadow: inset 3px 0 0 0 var(--primary-outline-border);
    }

    .ds-notif-item.success {
      box-shadow: inset 3px 0 0 0 var(--success-outline-border);
    }

    .ds-notif-item.warning {
      box-shadow: inset 3px 0 0 0 var(--warning-outline-border);
    }

    .ds-notif-item.error {
      box-shadow: inset 3px 0 0 0 var(--danger-outline-border);
    }

    .ds-notif-dot {
      width: 8px;
      height: 8px;
      border-radius: var(--radius-full);
      background-color: var(--primary-filled-bg);
      flex-shrink: 0;
      margin-top: var(--space-1);
    }

    .ds-notif-item.unread .ds-notif-dot {
      opacity: 1;
    }

    .ds-notif-item:not(.unread) .ds-notif-dot {
      opacity: 0;
    }

    .ds-notif-content {
      flex: 1;
      min-width: 0;
    }

    .ds-notif-item-title {
      font-family: var(--font-sans);
      font-size: var(--font-size-sm);
      color: var(--content-primary);
    }

    .ds-notif-item.unread .ds-notif-item-title {
      font-weight: var(--font-weight-semibold);
    }

    .ds-notif-item-desc {
      font-family: var(--font-sans);
      font-size: var(--font-size-xs);
      color: var(--content-secondary);
      margin-top: var(--space-0-5);
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .ds-notif-item-time {
      font-family: var(--font-sans);
      font-size: var(--font-size-xs);
      color: var(--content-tertiary);
      margin-top: var(--space-1);
    }

    .ds-notif-item-actions {
      display: flex;
      flex-direction: row;
      gap: var(--space-1);
      margin-top: var(--space-2);
    }

    .ds-notif-action-btn {
      font-family: var(--font-sans);
      font-size: var(--font-size-xs);
      padding: var(--space-1) var(--space-2);
      border-radius: var(--radius-sm);
      background-color: var(--neutral-tonal-bg);
      color: var(--content-primary);
      border: none;
      cursor: pointer;
      outline: none;
      transition: background-color var(--motion-fast) var(--ease-standard);
    }

    .ds-notif-action-btn:hover,
    .ds-notif-action-btn.hover {
      background-color: color-mix(in srgb, var(--neutral-tonal-bg) 70%, var(--surface-default) 30%);
    }

    .ds-notif-action-btn:focus-visible {
      box-shadow: 0 0 0 2px var(--primary-filled-bg);
    }

    .ds-notif-footer {
      padding: var(--space-3);
      text-align: center;
      box-shadow: inset 0 1px 0 0 var(--border-subtle);
    }

    .ds-notif-footer-link {
      font-family: var(--font-sans);
      font-size: var(--font-size-sm);
      color: var(--primary-outline-fg);
      cursor: pointer;
      transition: color var(--motion-fast) var(--ease-standard);
    }

    .ds-notif-footer-link:hover,
    .ds-notif-footer-link.hover {
      color: color-mix(in srgb, var(--primary-outline-fg) 80%, var(--surface-default) 20%);

      box-shadow: 0 0 0 2px var(--primary-filled-bg);

    }

    .ds-notif-empty {
      padding: var(--space-6);
      text-align: center;
      color: var(--content-tertiary);
      font-family: var(--font-sans);
      font-size: var(--font-size-sm);
    }

    .ds-notif-group {
      padding: var(--space-2) var(--space-4);
      font-family: var(--font-sans);
      font-size: var(--font-size-xs);
      color: var(--content-tertiary);
      font-weight: var(--font-weight-medium);
      text-transform: uppercase;
    }

       ============================================================ */

    .ds-search {
      position: relative;
      max-width: 640px;

    .ds-search-bar {
      display: flex;
      flex-direction: row;
      align-items: center;
      gap: var(--space-2);
      padding: var(--space-2) var(--space-3);

      box-shadow: inset 0 0 0 1px var(--border-subtle);
      border-radius: var(--radius-lg);
      transition: box-shadow var(--motion-fast) var(--ease-standard);
    }

    .ds-search-bar:hover,
    .ds-search-bar.hover {
      box-shadow: inset 0 0 0 1px var(--border-default);
    }

    .ds-search-bar.focused {
      box-shadow: inset 0 0 0 2px var(--primary-filled-bg);
    }

    .ds-search-bar.focused:hover,
    .ds-search-bar.focused.hover {
      box-shadow: inset 0 0 0 2px var(--primary-filled-bg);

    .ds-search-bar.disabled.hover {
      box-shadow: inset 0 0 0 1px var(--border-subtle);
    }

    .ds-search-icon {
      width: 20px;
      height: 20px;
      color: var(--content-tertiary);
      flex-shrink: 0;
    }

    .ds-search-input {
      flex: 1;
      border: none;
      background-color: transparent;
      font-family: var(--font-sans);
      font-size: var(--font-size-sm);
      color: var(--content-primary);
      outline: none;
    }

    .ds-search-input::placeholder {
      color: var(--content-tertiary);
    }

    .ds-search-clear {
      width: 20px;
      height: 20px;
      padding: 0;
      border: none;
      background-color: transparent;
      color: var(--content-tertiary);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      transition: opacity var(--motion-fast) var(--ease-standard);
      flex-shrink: 0;
    }

    .ds-search.has-value .ds-search-clear {
      opacity: 1;
    }

    .ds-search-clear:hover,
    .ds-search-clear.hover {
      color: var(--content-primary);
    }

    .ds-search-clear:focus-visible {
      box-shadow: 0 0 0 2px var(--primary-filled-bg);
    }

    .ds-search-dropdown {
      position: absolute;
      top: 100%;
      inset-inline-start: 0;
      inset-inline-end: 0;
      margin-top: var(--space-1);
      background-color: var(--surface-raised);
      border-radius: var(--radius-md);
      box-shadow: var(--shadow-md);
      overflow: hidden;
      z-index: 10;
    }

    .ds-search-category {
      padding: var(--space-2) var(--space-3);
      font-family: var(--font-sans);
      font-size: var(--font-size-xs);
      color: var(--content-tertiary);
      text-transform: uppercase;
      font-weight: var(--font-weight-medium);
    }

    .ds-search-suggestion {
      display: flex;
      flex-direction: row;
      align-items: center;
      gap: var(--space-3);
      padding: var(--space-2) var(--space-3);
      cursor: pointer;
      position: relative;
      transition: background-color var(--motion-fast) var(--ease-standard);
    }

    .ds-search-suggestion:hover,
    .ds-search-suggestion.hover {
      background-color: var(--neutral-tonal-bg);
    }

    .ds-search-suggestion:focus-visible {
      box-shadow: inset 0 0 0 2px var(--primary-filled-bg);
    }

    .ds-search-suggestion.active {
      background-color: var(--primary-tonal-bg);
    }

    .ds-search-suggestion-icon {
      width: 16px;
      height: 16px;
      color: var(--content-tertiary);
      flex-shrink: 0;
    }

    .ds-search-suggestion-label {
      font-family: var(--font-sans);
      font-size: var(--font-size-sm);
      color: var(--content-primary);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .ds-search-filters {
      display: flex;
      flex-direction: row;
      gap: var(--space-2);
      margin-top: var(--space-2);
      flex-wrap: wrap;
    }

    .ds-search-filter-chip {
      display: inline-flex;
      align-items: center;
      gap: var(--space-1);
      padding: var(--space-1) var(--space-2);
      border-radius: var(--radius-full);
      background-color: var(--neutral-tonal-bg);
      font-family: var(--font-sans);
      font-size: var(--font-size-xs);
      color: var(--content-primary);
      cursor: pointer;
      border: none;
      outline: none;
      transition: background-color var(--motion-fast) var(--ease-standard);
    }

    .ds-search-filter-chip:hover,
    .ds-search-filter-chip.hover {
      background-color: color-mix(in srgb, var(--neutral-tonal-bg) 70%, var(--surface-default) 30%);
    }

    .ds-search-filter-chip:focus-visible {
      box-shadow: 0 0 0 2px var(--primary-filled-bg);
    }

    .ds-search-results {
      margin-top: var(--space-3);
    }

    .ds-search-result {
      display: flex;
      flex-direction: column;
      gap: var(--space-2);
      padding: var(--space-3);
      border-radius: var(--radius-md);
      cursor: pointer;
      transition: background-color var(--motion-fast) var(--ease-standard);
    }

    .ds-search-result:hover,
    .ds-search-result.hover {
      background-color: var(--neutral-tonal-bg);
    }

    .ds-search-result:focus-visible {
      box-shadow: inset 0 0 0 2px var(--primary-filled-bg);
    }

    .ds-search-result-title {
      font-family: var(--font-sans);
      font-size: var(--font-size-sm);
      color: var(--content-primary);
      font-weight: var(--font-weight-medium);
    }

    .ds-search-result-snippet {
      font-family: var(--font-sans);
      font-size: var(--font-size-xs);
      color: var(--content-secondary);
      margin-top: var(--space-0-5);
    }

    .ds-search-result-meta {
      font-family: var(--font-sans);
      font-size: var(--font-size-xs);
      color: var(--content-tertiary);
      margin-top: var(--space-1);
    }

    .ds-search-match {
      background-color: color-mix(in srgb, var(--primary-filled-bg) 20%, transparent);
      border-radius: var(--radius-xs);
      padding: 0 2px;
    }

    .ds-search-empty {
      padding: var(--space-6);
      text-align: center;
      color: var(--content-tertiary);
      font-family: var(--font-sans);
      font-size: var(--font-size-sm);
    }

    /* ============================================================
       5. EMPTY STATES (.ds-empty-*)
       ============================================================ */

    .ds-empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: var(--space-6);
      text-align: center;
      max-width: 400px;
      margin: 0 auto;
    }

    .ds-empty-state.compact {
      padding: var(--space-4);
      max-width: 300px;
    }

    .ds-empty-state.inline {
      padding: var(--space-4);
    }

    .ds-empty-illustration {
      width: 120px;
      height: 120px;
      background-color: var(--neutral-tonal-bg);
      border-radius: var(--radius-full);
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: var(--space-6);
      color: var(--content-tertiary);
    }

    .ds-empty-state.compact .ds-empty-illustration {
      width: 80px;
      height: 80px;
      margin-bottom: var(--space-4);
    }

    .ds-empty-state.error .ds-empty-illustration {
      background-color: color-mix(in srgb, var(--danger-filled-bg) 20%, transparent);
    }

    .ds-empty-icon {
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--content-tertiary);
    }

    .ds-empty-state.error .ds-empty-icon {
      color: var(--danger-outline-fg);
    }

    .ds-empty-title {
      font-family: var(--font-sans);
      font-size: var(--font-size-lg);
      font-weight: var(--font-weight-semibold);
      color: var(--content-secondary);
      margin-bottom: var(--space-3);
    }

    .ds-empty-description {
      font-family: var(--font-sans);
      font-size: var(--font-size-sm);
      color: var(--content-tertiary);
      margin-bottom: var(--space-5);
      max-width: 320px;
      line-height: var(--line-height-normal);
    }

    .ds-empty-action {
      padding: var(--space-2) var(--space-4);
      background-color: var(--primary-filled-bg);
      color: var(--primary-filled-fg);
      border-radius: var(--radius-md);
      font-family: var(--font-sans);
      font-size: var(--font-size-sm);
      font-weight: var(--font-weight-medium);
      cursor: pointer;
      border: none;
      outline: none;
      position: relative;
      transition: all var(--motion-fast) var(--ease-standard);
    }

    .ds-empty-action:hover,
    .ds-empty-action.hover {
      background-color: color-mix(in srgb, var(--primary-filled-bg) 85%, var(--surface-default) 15%);
    }

    .ds-empty-action:hover::before,
    .ds-empty-action.hover::before {
      background-color: color-mix(in srgb, currentColor 12%, transparent);
    }

    .ds-empty-action::before {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: var(--radius-md);
      background-color: transparent;
      pointer-events: none;
    }

    .ds-empty-action:focus-visible {
      box-shadow: 0 0 0 2px var(--primary-filled-bg);
    }

    .ds-empty-secondary {
      font-family: var(--font-sans);
      font-size: var(--font-size-sm);
      color: var(--primary-outline-fg);
      margin-top: var(--space-3);
      cursor: pointer;
      outline: none;
      transition: color var(--motion-fast) var(--ease-standard);
    }

    .ds-empty-secondary:hover,
    .ds-empty-secondary.hover {
      color: var(--primary-outline-fg);
      text-decoration: underline;
    }

    .ds-empty-secondary:focus-visible {
      box-shadow: 0 0 0 2px var(--primary-filled-bg);
    }

    /* ============================================================
       SPRINT E ANIMATIONS
       ============================================================ */

    @keyframes ds-chat-fade-up {
      from {
        opacity: 0;
        transform: translateY(8px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes ds-cmd-enter {
      from {
        opacity: 0;
        transform: scale(0.95);
      }
      to {
        opacity: 1;
        transform: scale(1);
      }
    }

    @keyframes ds-spring-settle {
      0% { transform: scale(0.9); opacity: 0; }
      100% { transform: scale(1); opacity: 1; }
    }

    @keyframes ds-cursor-blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0; }
    }

    @keyframes ds-token-fade-in {
      from { opacity: 0; transform: translateY(2px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* ---- Streaming Text ---- */
    .ds-stream-cursor {
      display: inline-block;
      width: 2px;
      height: 1.2em;
      background-color: var(--primary-filled-bg);
      vertical-align: text-bottom;
      animation: ds-cursor-blink var(--stream-cursor-blink) step-end infinite;
    }

    .ds-stream-token {
      display: inline;
      animation: ds-token-fade-in var(--stream-token-duration) var(--ease-enter) both;
    }

    @media (prefers-reduced-motion: reduce) {
      .ds-chat-bubble { animation: none; }
      .ds-cmd-palette { animation: none; }
      .ds-spring-enter { animation: none; }
      .ds-stream-cursor { animation: none; opacity: 1; }
      .ds-stream-token { animation: none; }
    }

    /* ---- AI Confidence Indicator ---- */
    .ds-confidence {
      display: inline-flex;
      align-items: center;
      gap: var(--space-2);
      font-family: var(--font-sans);
      font-size: var(--font-size-sm);
      color: var(--content-secondary);
    }

    .ds-confidence-bar {
      display: flex;
      align-items: center;
      gap: 2px;
      height: 16px;
    }

    .ds-confidence-segment {
      width: 4px;
      height: 100%;
      border-radius: var(--radius-xs);
      background-color: var(--border-subtle);
      transition: background-color var(--motion-fast) var(--ease-standard);
    }

    .ds-confidence.high .ds-confidence-segment.active { background-color: var(--success-filled-bg); }
    .ds-confidence.medium .ds-confidence-segment.active { background-color: var(--warning-filled-bg); }
    .ds-confidence.low .ds-confidence-segment.active { background-color: var(--danger-filled-bg); }

    .ds-confidence-label {
      font-family: var(--font-sans);
      font-size: var(--font-size-xs);
      color: var(--content-tertiary);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .ds-confidence.high .ds-confidence-label { color: var(--success-outline-fg); }
    .ds-confidence.medium .ds-confidence-label { color: var(--warning-outline-fg); }
    .ds-confidence.low .ds-confidence-label { color: var(--danger-outline-fg); }

    /* ---- Reasoning Trace Block ---- */
    .ds-reasoning-trace {
      font-family: var(--font-sans);
      font-size: var(--font-size-sm);
      color: var(--content-secondary);
      background-color: var(--surface-sunken);
      border-radius: var(--radius-lg);
      overflow: hidden;
    }

    .ds-reasoning-trigger {
      display: flex;
      align-items: center;
      gap: var(--space-2);
      padding: var(--space-3) var(--space-4);
      width: 100%;
      background: none;
      font-family: var(--font-sans);
      font-size: var(--font-size-sm);
      color: var(--content-tertiary);
      cursor: pointer;
      transition: color var(--motion-fast) var(--ease-standard);
    }

    .ds-reasoning-trigger:hover,
    .ds-reasoning-trigger.hover { color: var(--content-secondary); }

    .ds-reasoning-trigger:focus-visible {
      outline: none;
      box-shadow: inset 0 0 0 2px var(--primary-filled-bg);
    }

    .ds-reasoning-trigger .ds-reasoning-chevron {
      display: inline-flex;
      transition: transform var(--motion-fast) var(--ease-standard);
    }

    .ds-reasoning-trace.expanded .ds-reasoning-chevron { transform: rotate(90deg); }
    [dir="rtl"] .ds-reasoning-trace.expanded .ds-reasoning-chevron { transform: rotate(-90deg); }

    .ds-reasoning-trigger .ds-reasoning-icon {
      color: var(--ai-tonal-fg);
    }

    .ds-reasoning-content {
      padding: 0 var(--space-4) var(--space-4);
      display: none;
    }

    .ds-reasoning-trace.expanded .ds-reasoning-content { display: block; }

    .ds-reasoning-step {
      display: flex;
      gap: var(--space-3);
      padding: var(--space-2) 0;
    }

    .ds-reasoning-step + .ds-reasoning-step {
      box-shadow: inset 0 1px 0 0 var(--border-subtle);
    }

    .ds-reasoning-step-marker {
      flex-shrink: 0;
      width: 20px;
      height: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: var(--radius-full);
      background-color: var(--ai-tonal-bg);
      color: var(--ai-tonal-fg);
      font-family: var(--font-mono);
      font-size: var(--font-size-xs);
    }

    .ds-reasoning-step-text {
      font-family: var(--font-sans);
      font-size: var(--font-size-sm);
      color: var(--content-secondary);
      line-height: 1.5;
    }

    .ds-reasoning-step-text .ds-reasoning-tool {
      font-family: var(--font-mono);
      font-size: var(--font-size-xs);
      color: var(--ai-outline-fg);
      background-color: var(--ai-tonal-bg);
      padding: var(--space-0-5) var(--space-1);
      border-radius: var(--radius-sm);
    }

    @media (prefers-reduced-motion: reduce) {
      .ds-reasoning-trigger .ds-reasoning-chevron { transition: none; }
    }

    /* ---- Activity Event Card ---- */
    .ds-activity-card {
      display: flex;
      align-items: flex-start;
      gap: var(--space-3);
      padding: var(--space-3) var(--space-4);
      font-family: var(--font-sans);
      background-color: var(--surface-sunken);
      border-radius: var(--radius-lg);
      animation: ds-token-fade-in var(--motion-normal) var(--ease-enter) both;
    }

    .ds-activity-card + .ds-activity-card {
      margin-block-start: var(--space-2);
    }

    .ds-activity-icon {
      flex-shrink: 0;
      width: 32px;
      height: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: var(--radius-full);
      font-size: var(--font-size-base);
    }

    .ds-activity-card.search .ds-activity-icon { background-color: var(--primary-tonal-bg); color: var(--primary-tonal-fg); }
    .ds-activity-card.plan .ds-activity-icon { background-color: var(--ai-tonal-bg); color: var(--ai-tonal-fg); }
    .ds-activity-card.tool .ds-activity-icon { background-color: var(--warning-tonal-bg); color: var(--warning-tonal-fg); }
    .ds-activity-card.complete .ds-activity-icon { background-color: var(--success-tonal-bg); color: var(--success-tonal-fg); }
    .ds-activity-card.error .ds-activity-icon { background-color: var(--danger-tonal-bg); color: var(--danger-tonal-fg); }

    .ds-activity-body {
      flex: 1;
      min-width: 0;
    }

    .ds-activity-title {
      font-family: var(--font-sans);
      font-size: var(--font-size-sm);
      font-weight: var(--font-weight-medium);
      color: var(--content-primary);
    }

    .ds-activity-desc {
      font-family: var(--font-sans);
      font-size: var(--font-size-xs);
      color: var(--content-tertiary);
      margin-block-start: var(--space-0-5);
    }

    .ds-activity-meta {
      font-family: var(--font-mono);
      font-size: var(--font-size-xs);
      color: var(--content-tertiary);
      margin-block-start: var(--space-1);
    }

    .ds-activity-progress {
      height: 2px;
      background-color: var(--border-subtle);
      border-radius: var(--radius-full);
      margin-block-start: var(--space-2);
      overflow: hidden;
    }

    .ds-activity-progress-bar {
      height: 100%;
      background-color: var(--primary-filled-bg);
      border-radius: var(--radius-full);
      transition: width var(--motion-normal) var(--ease-standard);
    }

    @media (prefers-reduced-motion: reduce) {
      .ds-activity-card { animation: none; }
    }

    /* ============================================================
       RESPONSIVE: MOBILE (max-width: 640px)
       ============================================================ */
    @media (max-width: 640px) {
      /* Nav Rail: auto-collapse on mobile (stays vertical) */
      .ds-nav-rail { width: 56px; }
      .ds-nav-rail .ds-nav-rail-logo { display: none; }
      .ds-nav-rail .ds-nav-rail-item { justify-content: center; padding: var(--space-2-5); }
      .ds-nav-rail .ds-nav-rail-item span:not(.material-symbols-rounded) { display: none; }
      .ds-nav-rail .ds-nav-rail-item-badge { display: none; }
      .ds-nav-rail-toggle { display: none; }

      /* Dialog: full-screen on mobile */
      .ds-dialog {
        width: 100%;
        max-width: 100%;
        max-height: 100vh;
        border-radius: 0;
        height: 100%;
      }

      /* Panel: full-width on mobile */
      .ds-panel {
        border-radius: 0;
        max-height: 100vh;
      }

      /* Data Grid: horizontal scroll with sticky first column */
      .ds-data-grid-wrapper {
        overflow-x: auto;
        -webkit-overflow-scrolling: touch;
      }
      .ds-data-grid {
        min-width: 600px;
      }
      .ds-data-grid th:first-child,
      .ds-data-grid td:first-child {
        position: sticky;
        inset-inline-start: 0;
        z-index: 1;
        background-color: var(--surface-default);
      }
      .ds-data-grid thead th:first-child {
        background-color: var(--surface-sunken);
      }

      /* Search: full-width results */
      .ds-search-container { max-width: 100%; }

      /* Command Palette: full-screen on mobile */
      .ds-cmd-palette {
        width: 100%;
        max-width: 100%;
        max-height: 100vh;
        border-radius: 0;
      }

      /* Chat: fill viewport */
      .ds-chat-container {
        max-width: 100%;
        border-radius: 0;
        max-height: 100vh;
      }

      /* Notification Center: full-width */
      .ds-notif-center,
      .ds-notif-panel {
        width: 100%;
        max-width: 100%;
        border-radius: 0;
        position: relative;
        top: auto;
        inset-inline-end: auto;
        margin-top: 0;
      }
    }

    /* ============================================================
       RESPONSIVE: TABLET+ (min-width: 641px)
       ============================================================ */
    @media (min-width: 641px) {
      /* Ensure nav rail stays sidebar */
      .ds-nav-rail {
        flex-direction: column;
        width: auto;
        height: 100%;
      }
    }

    /* ============================================================
       VIEWPORT TOGGLE SIMULATION
       Mirrors @media mobile rules for the tester's data-viewport
       attribute, so component preview responds to the toggle.
       ============================================================ */
    /* Nav Rail: auto-collapse on mobile (stays vertical) */
    [data-viewport="mobile"] .ds-nav-rail { width: 56px; }
    [data-viewport="mobile"] .ds-nav-rail .ds-nav-rail-logo { display: none; }
    [data-viewport="mobile"] .ds-nav-rail .ds-nav-rail-item { justify-content: center; padding: var(--space-2-5); }
    [data-viewport="mobile"] .ds-nav-rail .ds-nav-rail-item span:not(.material-symbols-rounded) { display: none; }
    [data-viewport="mobile"] .ds-nav-rail .ds-nav-rail-item-badge { display: none; }
    [data-viewport="mobile"] .ds-nav-rail-toggle { display: none; }

    [data-viewport="mobile"] .ds-dialog {
      width: 100%; max-width: 100%; border-radius: 0;
    }
    [data-viewport="mobile"] .ds-panel {
      border-radius: 0;
    }
    [data-viewport="mobile"] .ds-data-grid-wrapper {
      overflow-x: auto; -webkit-overflow-scrolling: touch;
    }
    [data-viewport="mobile"] .ds-data-grid { min-width: 600px; }
    [data-viewport="mobile"] .ds-data-grid th:first-child,
    [data-viewport="mobile"] .ds-data-grid td:first-child {
      position: sticky; inset-inline-start: 0; z-index: 1; background-color: var(--surface-default);
    }
    [data-viewport="mobile"] .ds-data-grid thead th:first-child {
      background-color: var(--surface-sunken);
    }
    [data-viewport="mobile"] .ds-search-container { max-width: 100%; }
    [data-viewport="mobile"] .ds-cmd-palette {
      width: 100%; max-width: 100%; border-radius: 0;
    }
    [data-viewport="mobile"] .ds-chat-container {
      max-width: 100%; border-radius: 0;
    }
    [data-viewport="mobile"] .ds-notif-center,
    [data-viewport="mobile"] .ds-notif-panel {
      width: 100%; max-width: 100%; border-radius: 0;
      position: relative; top: auto; inset-inline-end: auto; margin-top: 0;
    }

    /* ============================================================
       CONTAINER QUERIES
       ============================================================ */

    /* Card container context */
    .ds-surface { container-type: inline-size; }

    /* Card: stack media horizontally when container is wide enough */
    @container (min-width: 480px) {
      .ds-card.media-inline {
        flex-direction: row;
      }
      .ds-card.media-inline .ds-card-media {
        width: 200px;
        flex-shrink: 0;
      }
      .ds-card.media-inline .ds-card-media img {
        height: 100%;
        object-fit: cover;
      }
    }

    /* Card: compact layout in narrow containers */
    @container (max-width: 240px) {
      .ds-card-header { padding: var(--space-2) var(--space-3); }
      .ds-card-body { padding: var(--space-2) var(--space-3); }
      .ds-card-footer { padding: var(--space-2) var(--space-3); }
    }

    /* List item: show secondary actions only in wider containers */
    .ds-list { container-type: inline-size; }

    @container (max-width: 300px) {
      .ds-list-item-meta { display: none; }
      .ds-list-item-actions { display: none; }
    }

    /* Data grid: hide low-priority columns in narrow containers */
    .ds-data-grid-wrapper { container-type: inline-size; }

    @container (max-width: 500px) {
      .ds-data-grid .col-priority-low { display: none; }
    }

    /* ============================================================
       TOUCH ALTERNATIVES (hover-dependent UI on touch devices)
       ============================================================ */
    @media (hover: none) and (pointer: coarse) {
      /* Tooltip: show on tap via focus, increase touch target */
      .ds-tooltip-trigger {
        min-width: 44px;
        min-height: 44px;
      }

      /* Buttons: 44px minimum touch target */
      .ds-button.xs { min-height: 44px; }
      .ds-button.sm { min-height: 44px; }
      .ds-icon-button.sm { min-width: 44px; min-height: 44px; }

      /* Remove hover state layers on touch (prevent sticky hover) */
      .ds-button::before,
      .ds-icon-button::before,
      .ds-chip::before,
      .ds-surface.interactive::before,
      .ds-nav-rail-item::before {
        display: none;
      }

      /* Pagination: larger touch targets */
      .ds-pagination-btn { min-width: 44px; min-height: 44px; }

      /* Selection controls: larger tap targets */
      .ds-checkbox-label,
      .ds-radio-label,
      .ds-switch-label {
        min-height: 44px;
        display: inline-flex;
        align-items: center;
      }

      /* Data grid rows: taller for touch */
      .ds-data-grid td { padding-block: var(--space-3); }

      /* Tree view: larger expand/collapse targets */
      .ds-tree-toggle { min-width: 44px; min-height: 44px; }

      /* Bottom sheet style for dropdowns (hint class for JS) */
      .ds-touch-bottom-sheet {
        position: fixed;
        bottom: 0;
        inset-inline-start: 0;
        width: 100%;
        max-height: 60vh;
        border-radius: var(--radius-xl) var(--radius-xl) 0 0;
        overflow-y: auto;
        z-index: var(--z-drawer);
        background-color: var(--surface-raised);
        box-shadow: var(--shadow-xl);
        animation: bottomSheetEnter var(--motion-normal) var(--ease-enter) both;
      }

      @keyframes bottomSheetEnter {
        from { transform: translateY(100%); }
        to { transform: translateY(0); }
      }

      .ds-touch-bottom-sheet-handle {
        width: 32px;
        height: 4px;
        border-radius: var(--radius-full);
        background-color: var(--border-default);
        margin: var(--space-2) auto var(--space-3);
      }
    }

    /* Ensure touch bottom sheet respects reduced motion */
    @media (hover: none) and (pointer: coarse) and (prefers-reduced-motion: reduce) {
      .ds-touch-bottom-sheet { animation: none; }
    }
  </style>

      button: {
        name: 'Button',
        description: 'Primary action trigger with multiple variants',
        controls: {
          emphasis: ['filled', 'tonal', 'outlined', 'ghost'],
          color: ['primary', 'danger', 'warning', 'success', 'neutral', 'ai'],
          size: ['xs', 'sm', 'md', 'lg', 'xl'],
          state: ['default', 'hover', 'disabled'],
        },
        defaults: {
          emphasis: 'filled',
          color: 'primary',
          size: 'md',
          state: 'default',
        },
        render: (config) => {
          const { emphasis, color, size, state } = config;
          const disabled = state === 'disabled';

    function resolveToken(tokenName) {

      const component = COMPONENTS[currentComponent];

      // Update header
      document.querySelector('.component-name').textContent = component.name;
      document.querySelector('.component-description').textContent = component.description;

      // Update control panel

      for (const [key, values] of Object.entries(component.controls)) {

        group.className = 'control-group-vertical';

        const label = document.createElement('label');
        label.textContent = key.charAt(0).toUpperCase() + key.slice(1);

        values.forEach(value => {
          const btn = document.createElement('button');
          btn.className = 'segmented-btn';
          btn.textContent = value.charAt(0).toUpperCase() + value.slice(1);
          btn.dataset.key = key;
          btn.dataset.value = value;

          if (currentConfig[key] === value) {
            btn.classList.add('active');
          }

          btn.addEventListener('click', () => {
            currentConfig[key] = value;
            updateUI();
          });

          segmented.appendChild(btn);
        });

        group.appendChild(segmented);
        controlPanel.appendChild(group);
      }

      // Update preview
      preview.innerHTML = component.render(currentConfig);

      // Update specs
      const tokenMap = component.tokens(currentConfig);
      specs.innerHTML = '';
      for (const [key, tokenVar] of Object.entries(tokenMap)) {

        keyEl.textContent = tokenVar;

          swatch.className = 'specs-swatch';
          swatch.style.backgroundColor = resolved;
          valueEl.appendChild(swatch);
        }
        valueEl.appendChild(document.createTextNode(resolved));

        item.appendChild(keyEl);
        item.appendChild(valueEl);
        specs.appendChild(item);
      }

      // Update top bar
      const name = document.querySelector('.component-name');
      const desc = document.querySelector('.component-description');
      name.textContent = component.name;
      desc.textContent = component.description;

        valueEl.textContent = isOn ? onLabel : offLabel;
        applyGlobalState();

  <!-- ============================================================

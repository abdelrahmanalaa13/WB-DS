  <script>
  (function() {
    'use strict';

    /* ---- 1. TOAST LIFECYCLE ---- */
    const DS_TOAST_DURATION = 5000;

    function dsToastDismiss(toastEl) {
      toastEl.style.opacity = '0';
      toastEl.style.transform = 'translateX(var(--space-4))';
      toastEl.style.transition = 'opacity var(--motion-fast) var(--ease-exit), transform var(--motion-fast) var(--ease-exit)';
      toastEl.addEventListener('transitionend', () => toastEl.remove(), { once: true });
    }

    document.addEventListener('click', (e) => {
      const dismissBtn = e.target.closest('.ds-toast-dismiss');
      if (dismissBtn) {
        const toast = dismissBtn.closest('.ds-toast');
        if (toast) dsToastDismiss(toast);
      }
    });

    // Auto-dismiss toasts after duration
    const toastObserver = new MutationObserver((mutations) => {
      mutations.forEach((m) => {
        m.addedNodes.forEach((node) => {
          if (node.nodeType === 1 && node.matches && node.matches('.ds-toast')) {
            setTimeout(() => { if (node.parentNode) dsToastDismiss(node); }, DS_TOAST_DURATION);
          }
          if (node.nodeType === 1 && node.querySelectorAll) {
            node.querySelectorAll('.ds-toast').forEach((t) => {
              setTimeout(() => { if (t.parentNode) dsToastDismiss(t); }, DS_TOAST_DURATION);
            });
          }
        });
      });
    });
    toastObserver.observe(document.body, { childList: true, subtree: true });

    /* ---- 2. DIALOG / MODAL LIFECYCLE ---- */
    document.addEventListener('click', (e) => {
      // Close dialog on dismiss button
      const closeBtn = e.target.closest('.ds-dialog-close, [data-dismiss="dialog"]');
      if (closeBtn) {
        const overlay = closeBtn.closest('.ds-dialog-overlay');
        if (overlay) {
          overlay.style.opacity = '0';
          overlay.addEventListener('transitionend', () => overlay.remove(), { once: true });
        }
      }
      // Close dialog on overlay backdrop click
      if (e.target.matches('.ds-dialog-overlay')) {
        e.target.style.opacity = '0';
        e.target.addEventListener('transitionend', () => e.target.remove(), { once: true });
      }
    });

    // Escape key closes topmost dialog
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') {
        const overlay = document.querySelector('.ds-dialog-overlay');
        if (overlay) {
          overlay.style.opacity = '0';
          overlay.addEventListener('transitionend', () => overlay.remove(), { once: true });
        }
      }
    });

    /* ---- 3. ACCORDION TOGGLE ---- */
    document.addEventListener('click', (e) => {
      const trigger = e.target.closest('.ds-accordion-trigger');
      if (!trigger) return;
      const item = trigger.closest('.ds-accordion-item');
      if (!item) return;
      const content = item.querySelector('.ds-accordion-content');
      const isOpen = item.classList.contains('open');

      // Close siblings if single-expand mode
      const accordion = item.closest('.ds-accordion');
      if (accordion && !accordion.hasAttribute('data-multi')) {
        accordion.querySelectorAll('.ds-accordion-item.open').forEach((sibling) => {
          if (sibling !== item) {
            sibling.classList.remove('open');
            const sc = sibling.querySelector('.ds-accordion-content');
            if (sc) sc.style.maxHeight = '0';
            const st = sibling.querySelector('.ds-accordion-trigger');
            if (st) st.setAttribute('aria-expanded', 'false');
          }
        });
      }

      if (isOpen) {
        item.classList.remove('open');
        if (content) content.style.maxHeight = '0';
        trigger.setAttribute('aria-expanded', 'false');
      } else {
        item.classList.add('open');
        if (content) content.style.maxHeight = content.scrollHeight + 'px';
        trigger.setAttribute('aria-expanded', 'true');
      }
    });

    /* ---- 4. TAB SWITCHING ---- */
    document.addEventListener('click', (e) => {
      const tab = e.target.closest('.ds-tab[role="tab"]');
      if (!tab || tab.disabled) return;
      const tablist = tab.closest('[role="tablist"]');
      if (!tablist) return;

      tablist.querySelectorAll('.ds-tab').forEach((t) => {
        t.classList.remove('active');
        t.setAttribute('aria-selected', 'false');
        t.setAttribute('tabindex', '-1');
      });
      tab.classList.add('active');
      tab.setAttribute('aria-selected', 'true');
      tab.setAttribute('tabindex', '0');
    });

    // Arrow key navigation within tablists
    document.addEventListener('keydown', (e) => {
      if (e.key !== 'ArrowLeft' && e.key !== 'ArrowRight') return;
      const tab = e.target.closest('.ds-tab[role="tab"]');
      if (!tab) return;
      const tablist = tab.closest('[role="tablist"]');
      if (!tablist) return;
      const tabs = Array.from(tablist.querySelectorAll('.ds-tab:not([disabled])'));
      const idx = tabs.indexOf(tab);
      const dir = document.documentElement.dir === 'rtl' ? -1 : 1;
      const next = e.key === 'ArrowRight' ? dir : -dir;
      const target = tabs[(idx + next + tabs.length) % tabs.length];
      if (target) { target.focus(); target.click(); }
    });

    /* ---- 5. TEXT FIELD VALIDATION ---- */
    document.addEventListener('input', (e) => {
      const field = e.target.closest('.ds-text-field-input, .ds-textarea textarea');
      if (!field) return;
      const wrapper = field.closest('.ds-text-field, .ds-textarea');
      if (!wrapper) return;
      // Clear error state on input
      if (wrapper.classList.contains('error') && field.value.trim().length > 0) {
        wrapper.classList.remove('error');
        const errorMsg = wrapper.parentElement?.querySelector('.ds-field-error');
        if (errorMsg) errorMsg.style.display = 'none';
      }
    });

    document.addEventListener('focusin', (e) => {
      const field = e.target.closest('.ds-text-field-input, .ds-textarea textarea');
      if (!field) return;
      const wrapper = field.closest('.ds-text-field, .ds-textarea');
      if (wrapper) wrapper.classList.add('focused');
    });

    document.addEventListener('focusout', (e) => {
      const field = e.target.closest('.ds-text-field-input, .ds-textarea textarea');
      if (!field) return;
      const wrapper = field.closest('.ds-text-field, .ds-textarea');
      if (wrapper) wrapper.classList.remove('focused');
    });

    /* ---- 6. SNACKBAR DISMISS ---- */
    document.addEventListener('click', (e) => {
      const dismissBtn = e.target.closest('.ds-snackbar-dismiss');
      if (!dismissBtn) return;
      const snackbar = dismissBtn.closest('.ds-snackbar');
      if (snackbar) {
        snackbar.style.opacity = '0';
        snackbar.style.transform = 'translateY(16px)';
        snackbar.style.transition = 'opacity var(--motion-fast) var(--ease-exit), transform var(--motion-fast) var(--ease-exit)';
        snackbar.addEventListener('transitionend', () => snackbar.remove(), { once: true });
      }
    });

    /* ---- 7. TREE VIEW EXPAND/COLLAPSE ---- */
    document.addEventListener('click', (e) => {
      const toggle = e.target.closest('.ds-tree-toggle');
      if (!toggle) return;
      const item = toggle.closest('.ds-tree-item');
      if (!item) return;
      const children = item.querySelector('.ds-tree-children');
      const isExpanded = toggle.getAttribute('aria-expanded') === 'true';
      toggle.setAttribute('aria-expanded', String(!isExpanded));
      if (children) children.style.display = isExpanded ? 'none' : 'block';
    });

    /* ---- 8. NOTIFICATION CENTER TABS ---- */
    document.addEventListener('click', (e) => {
      const tab = e.target.closest('.ds-notif-tab');
      if (!tab) return;
      const container = tab.closest('.ds-notif-center');
      if (!container) return;
      container.querySelectorAll('.ds-notif-tab').forEach((t) => {
        t.classList.remove('active');
        t.setAttribute('aria-selected', 'false');
      });
      tab.classList.add('active');
      tab.setAttribute('aria-selected', 'true');
    });

    /* ---- 9. CHIP SELECT/DESELECT ---- */
    document.addEventListener('click', (e) => {
      const chip = e.target.closest('.ds-chip');
      if (!chip) return;
      chip.classList.toggle('selected');
      chip.setAttribute('aria-pressed', chip.classList.contains('selected'));
    });

    /* ---- 10. PANEL CLOSE ---- */
    document.addEventListener('click', (e) => {
      const closeBtn = e.target.closest('.ds-panel-close, [data-dismiss="panel"]');
      if (!closeBtn) return;
      const panel = closeBtn.closest('.ds-panel');
      if (panel) {
        panel.style.opacity = '0';
        panel.style.transform = 'translateX(var(--space-4))';
        panel.style.transition = 'opacity var(--motion-fast) var(--ease-exit), transform var(--motion-fast) var(--ease-exit)';
        panel.addEventListener('transitionend', () => panel.remove(), { once: true });
      }
    });

    // Expose interaction contract functions globally for product consumers
    window.DS_INTERACTIONS = {
      toastDismiss: dsToastDismiss,
      TOAST_DURATION: DS_TOAST_DURATION,
    };
  })();
  </script>
</body>
</html>

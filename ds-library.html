    /* ============================================================
       RESET & BASE
       ============================================================ */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
    }

    body {
      font-family: var(--font-sans);
      font-size: var(--font-size-base);
      font-weight: var(--font-weight-regular);
      line-height: var(--line-height-normal);
      color: var(--content-primary);
      background-color: var(--surface-ground);
      transition: color var(--motion-fast) var(--ease-standard),
                  background-color var(--motion-fast) var(--ease-standard);
    }

    @media (prefers-reduced-motion: reduce) {
      body, body * {
        animation-duration: 1ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 1ms !important;
      }
    }

    /* ============================================================
       LAYOUT
       ============================================================ */
    #app {
      display: grid;
      grid-template-columns: 240px 1fr;
      grid-template-rows: 1fr;
      height: 100vh;
      overflow: hidden;
    }

    .sidebar {
      background-color: var(--surface-default);
      border-inline-end: 1px solid var(--border-subtle);
      display: flex;
      flex-direction: column;
      overflow-y: auto;
      overflow-x: hidden;
    }

    .sidebar-header {
      padding: var(--space-4) var(--space-3);
      border-block-end: 1px solid var(--border-subtle);
      flex-shrink: 0;
    }

    .sidebar-title {
      font-size: var(--font-size-lg);
      font-weight: var(--font-weight-bold);
      color: var(--content-primary);
      margin-bottom: var(--space-3);
    }

    .sidebar-controls {
      display: flex;
      flex-direction: column;
      gap: var(--space-3);
    }

    .global-switch {
      display: flex;
      align-items: center;
      justify-content: space-between;
      cursor: pointer;
      user-select: none;
    }

    .global-switch-info {
      display: flex;
      flex-direction: column;
      gap: 1px;
    }

    .global-switch-label {
      font-size: var(--font-size-sm);
      font-weight: var(--font-weight-medium);
      color: var(--content-primary);
    }

    .global-switch-value {
      font-size: var(--font-size-xs);
      color: var(--content-tertiary);
      font-family: var(--font-mono);
    }

    .global-switch-track {
      position: relative;
      width: 36px;
      height: 20px;
      background-color: var(--border-default);
      border-radius: var(--radius-full);
      transition: background-color var(--motion-fast) var(--ease-standard);
      flex-shrink: 0;
    }

    .global-switch-track.on {
      background-color: var(--primary-filled-bg);
    }

    .global-switch-thumb {
      position: absolute;
      width: 16px;
      height: 16px;
      top: 2px;
      inset-inline-start: 2px;
      background-color: var(--surface-default);
      border-radius: var(--radius-full);
      transition: inset-inline-start var(--motion-fast) var(--ease-spring);
    }

    .global-switch-track.on .global-switch-thumb {
      inset-inline-start: 18px;
    }

    .control-group {
      display: flex;
      gap: var(--space-1);
      font-size: var(--font-size-xs);
    }

    .control-group label {
      color: var(--content-tertiary);
      display: block;
      margin-bottom: var(--space-1);
      font-weight: var(--font-weight-medium);
    }

    .control-btn {
      flex: 1;
      padding: var(--space-1-5) var(--space-2);
      border: none;
      border-radius: var(--radius-sm);
      background-color: transparent;
      color: var(--content-tertiary);
      font-family: var(--font-sans);
      font-size: var(--font-size-xs);
      font-weight: var(--font-weight-medium);

    .ds-chip.primary { --_tonal-bg: var(--primary-tonal-bg); --_tonal-fg: var(--primary-tonal-fg); --_outline-border: var(--primary-outline-border); --_outline-fg: var(--primary-outline-fg); --_sel-bg: var(--primary-filled-bg); --_sel-fg: var(--primary-filled-fg); }
    .ds-chip.danger { --_tonal-bg: var(--danger-tonal-bg); --_tonal-fg: var(--danger-tonal-fg); --_outline-border: var(--danger-outline-border); --_outline-fg: var(--danger-outline-fg); --_sel-bg: var(--danger-filled-bg); --_sel-fg: var(--danger-filled-fg); }
    .ds-chip.warning { --_tonal-bg: var(--warning-tonal-bg); --_tonal-fg: var(--warning-tonal-fg); --_outline-border: var(--warning-outline-border); --_outline-fg: var(--warning-outline-fg); --_sel-bg: var(--warning-filled-bg); --_sel-fg: var(--warning-filled-fg); }
    .ds-chip.success { --_tonal-bg: var(--success-tonal-bg); --_tonal-fg: var(--success-tonal-fg); --_outline-border: var(--success-outline-border); --_outline-fg: var(--success-outline-fg); --_sel-bg: var(--success-filled-bg); --_sel-fg: var(--success-filled-fg); }
    .ds-chip.neutral { --_tonal-bg: var(--neutral-tonal-bg); --_tonal-fg: var(--neutral-tonal-fg); --_outline-border: var(--neutral-outline-border); --_outline-fg: var(--neutral-outline-fg); --_sel-bg: var(--neutral-filled-bg); --_sel-fg: var(--neutral-filled-fg); }
    .ds-chip.ai { --_tonal-bg: var(--ai-tonal-bg); --_tonal-fg: var(--ai-tonal-fg); --_outline-border: var(--ai-outline-border); --_outline-fg: var(--ai-outline-fg); --_sel-bg: var(--ai-filled-bg); --_sel-fg: var(--ai-filled-fg); }

    /* Chip style consumers (specificity: 0-2-0) */
    .ds-chip.tonal { background-color: var(--_tonal-bg); color: var(--_tonal-fg); }
    .ds-chip.outlined { box-shadow: inset 0 0 0 1px var(--_outline-border); color: var(--_outline-fg); }

    /* Chip selected state: overrides private vars (specificity: 0-2-0, source-order wins) */
    .ds-chip.selected { --_tonal-bg: var(--_sel-bg); --_tonal-fg: var(--_sel-fg); --_outline-border: var(--_sel-bg); --_outline-fg: var(--_sel-bg); }
    .ds-chip.outlined.selected { box-shadow: inset 0 0 0 1.5px var(--_outline-border); }

    /* TOGGLE */
    .ds-toggle {
      display: inline-flex;
      align-items: center;
      gap: var(--space-2);
    }

    .toggle-track {
      position: relative;
      background-color: var(--border-default);
      border-radius: var(--radius-full);
      cursor: pointer;
      transition: background-color var(--motion-fast) var(--ease-standard);
      border: none;
      padding: 0;
    }

    .toggle-track.on {
      background-color: var(--primary-filled-bg);
    }

    .toggle-thumb {
      position: absolute;
      background-color: var(--surface-default);
      border-radius: var(--radius-full);
      transition: inset-inline-start var(--motion-fast) var(--ease-spring);
      top: 50%;
      transform: translateY(-50%);
    }

    .toggle-track.sm { width: 36px; height: 20px; }
    .toggle-track.sm .toggle-thumb { width: 16px; height: 16px; inset-inline-start: 2px; }
    .toggle-track.sm.on .toggle-thumb { inset-inline-start: 18px; }

    .toggle-track.md { width: 44px; height: 24px; }
    .toggle-track.md .toggle-thumb { width: 20px; height: 20px; inset-inline-start: 2px; }
    .toggle-track.md.on .toggle-thumb { inset-inline-start: 22px; }

    .toggle-track.lg { width: 52px; height: 28px; }
    .toggle-track.lg .toggle-thumb { width: 24px; height: 24px; inset-inline-start: 2px; }
    .toggle-track.lg.on .toggle-thumb { inset-inline-start: 26px; }

    .toggle-track:focus {
      outline: none;
      box-shadow: var(--focus-ring);
    }

    .toggle-track:disabled {
      opacity: var(--state-disabled-content);
      cursor: not-allowed;
    }

    .toggle-label {
      font-family: var(--font-sans);
      font-size: var(--font-size-sm);
      color: var(--content-primary);
      cursor: pointer;
      user-select: none;
    }

    /* AVATAR */
    .ds-avatar {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      position: relative;
      border-radius: var(--radius-full);
      overflow: hidden;
      background-color: var(--primary-tonal-bg);
      color: var(--primary-tonal-fg);
      font-family: var(--font-sans);
      font-weight: var(--font-weight-semibold);
    }

    .ds-avatar.xs { width: 24px; height: 24px; font-size: var(--font-size-xs); }
    .ds-avatar.sm { width: 32px; height: 32px; font-size: var(--font-size-sm); }
    .ds-avatar.md { width: 40px; height: 40px; font-size: var(--font-size-base); }
    .ds-avatar.lg { width: 48px; height: 48px; font-size: var(--font-size-lg); }
    .ds-avatar.xl { width: 56px; height: 56px; font-size: var(--font-size-xl); }

    .ds-avatar.rounded { border-radius: var(--radius-md); }
    .ds-avatar.xs.rounded { border-radius: var(--radius-xs); }
    .ds-avatar.sm.rounded { border-radius: var(--radius-sm); }
    .ds-avatar.md.rounded { border-radius: var(--radius-md); }
    .ds-avatar.lg.rounded { border-radius: var(--radius-lg); }
    .ds-avatar.xl.rounded { border-radius: var(--radius-xl); }

    .ds-avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .ds-avatar svg {
      width: 50%;
      height: 50%;
    }

    .ds-avatar .material-symbols-rounded { font-size: 50%; }

    .avatar-wrapper { position: relative; display: inline-block; }
    .avatar-status {
      position: absolute;
      bottom: 0;
      inset-inline-end: 0;
      border: 2px solid var(--surface-default);
      border-radius: var(--radius-full);
      z-index: 1;
    }

    .avatar-status.xs { width: 6px; height: 6px; }
    .avatar-status.sm { width: 8px; height: 8px; }
    .avatar-status.md { width: 10px; height: 10px; }
    .avatar-status.lg { width: 12px; height: 12px; }
    .avatar-status.xl { width: 14px; height: 14px; }

    .avatar-status.online { background-color: var(--success-filled-bg); }
    .avatar-status.offline { background-color: var(--content-disabled); }
    .avatar-status.busy { background-color: var(--danger-filled-bg); }
    .avatar-status.away { background-color: var(--warning-filled-bg); }

    /* ============================================================
       DS-SURFACE: Shared base for all bounded containers
       ============================================================ */
    .ds-surface {
      border-radius: var(--radius-lg);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      transition: box-shadow var(--motion-fast) var(--ease-standard);
    }

    .ds-surface.elevated {
      background-color: var(--surface-raised);
      box-shadow: var(--shadow-sm);
    }
    .ds-surface.elevated:hover { box-shadow: var(--shadow-md); }

    .ds-surface.outlined {
      background-color: var(--surface-default);
      box-shadow: inset 0 0 0 1px var(--border-subtle);
    }

    .ds-surface.filled {
      background-color: var(--surface-sunken);
    }

    /* Density scaling -- controls radius, internal spacing inherits via child slots */
    .ds-surface.compact { border-radius: var(--radius-md); }
    .ds-surface.comfortable { border-radius: var(--radius-xl); }
    /* default density uses base radius-lg */

    /* Interactive trait */
    .ds-surface.interactive { cursor: pointer; position: relative; }
    .ds-surface.interactive::before {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: inherit;
      background-color: currentColor;
      opacity: 0;
      transition: opacity var(--motion-fast) var(--ease-standard);
      pointer-events: none;
    }
    .ds-surface.interactive:hover::before,
    .ds-surface.interactive.hover::before { opacity: var(--state-hover); }
    .ds-surface.interactive:focus-visible::before { opacity: var(--state-focus); }
    .ds-surface.interactive:active::before { opacity: var(--state-pressed); }

    /* Surface role variable-scope modifiers (specificity: 0-2-0) */
    .ds-surface.danger { --_filled-bg: var(--danger-filled-bg); --_filled-fg: var(--danger-filled-fg); --_tonal-bg: var(--danger-tonal-bg); --_tonal-fg: var(--danger-tonal-fg); --_outline-fg: var(--danger-outline-fg); --_outline-border: var(--danger-outline-border); }
    .ds-surface.warning { --_filled-bg: var(--warning-filled-bg); --_filled-fg: var(--warning-filled-fg); --_tonal-bg: var(--warning-tonal-bg); --_tonal-fg: var(--warning-tonal-fg); --_outline-fg: var(--warning-outline-fg); --_outline-border: var(--warning-outline-border); }
    .ds-surface.success { --_filled-bg: var(--success-filled-bg); --_filled-fg: var(--success-filled-fg); --_tonal-bg: var(--success-tonal-bg); --_tonal-fg: var(--success-tonal-fg); --_outline-fg: var(--success-outline-fg); --_outline-border: var(--success-outline-border); }
    .ds-surface.neutral { --_filled-bg: var(--neutral-filled-bg); --_filled-fg: var(--neutral-filled-fg); --_tonal-bg: var(--neutral-tonal-bg); --_tonal-fg: var(--neutral-tonal-fg); --_outline-fg: var(--neutral-outline-fg); --_outline-border: var(--neutral-outline-border); }
    .ds-surface.ai { --_filled-bg: var(--ai-filled-bg); --_filled-fg: var(--ai-filled-fg); --_tonal-bg: var(--ai-tonal-bg); --_tonal-fg: var(--ai-tonal-fg); --_outline-fg: var(--ai-outline-fg); --_outline-border: var(--ai-outline-border); }

    /* Surface status style consumers (specificity: 0-2-0) */
    .ds-surface.status-tonal { border-radius: var(--radius-md); background-color: var(--_tonal-bg); color: var(--_tonal-fg); }
    .ds-surface.status-filled { border-radius: var(--radius-md); background-color: var(--_filled-bg); color: var(--_filled-fg); }
    .ds-surface.status-outlined { border-radius: var(--radius-md); background-color: transparent; box-shadow: inset 0 0 0 1px var(--_outline-border); color: var(--_outline-fg); }

    /* ============================================================
       WAVE 2: LAYOUT & NAV
       ============================================================ */

    /* DIVIDER */
    .ds-divider {
      display: flex;
      align-items: center;
      gap: var(--space-3);
    }

    .ds-divider.horizontal {
      width: 100%;
      flex-direction: row;
    }

    .ds-divider.vertical {
      height: 100%;
      flex-direction: column;
      width: auto;
    }

    .ds-divider-line {
      flex: 1;
      background-color: var(--border-subtle);
    }

    .ds-divider.horizontal .ds-divider-line { height: 1px; min-width: 20px; }
    .ds-divider.vertical .ds-divider-line { width: 1px; min-height: 20px; }

    .ds-divider.strong .ds-divider-line { background-color: var(--border-default); }

    .ds-divider-label {
      font-family: var(--font-sans);
      font-size: var(--font-size-xs);
      font-weight: var(--font-weight-medium);
      color: var(--content-tertiary);
      white-space: nowrap;
      padding: 0;
    }

    /* CARD */
    /* CARD -- extends ds-surface, adds slot layout */
    .ds-card {
      /* Inherits: radius, overflow, flex-column, transition, variant colors, interactive trait from ds-surface */
    }

    .ds-card-media {
      width: 100%;
      overflow: hidden;
    }
    .ds-card-media img {
      width: 100%;
      height: auto;
      display: block;
      object-fit: cover;
    }
    .ds-card-media.fixed-height { height: 160px; }
    .ds-card-media.fixed-height img { height: 100%; }

    /* --- Default density (default) --- */
    .ds-card-header {
      padding: var(--space-4) var(--space-5);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: var(--space-3);
    }

    .ds-card-header-title {
      font-size: var(--font-size-base);
      font-weight: var(--font-weight-semibold);
      color: var(--content-primary);
    }

    .ds-card-header-subtitle {
      font-size: var(--font-size-sm);
      color: var(--content-secondary);
      margin-top: 2px;
    }

    .ds-card-content {
      padding: 0 var(--space-5) var(--space-4);
      font-size: var(--font-size-sm);
      color: var(--content-secondary);
      line-height: var(--line-height-normal);
    }

    .ds-card-footer {
      padding: var(--space-3) var(--space-5);
      box-shadow: inset 0 1px 0 0 var(--border-subtle);
      display: flex;
      gap: var(--space-2);
      justify-content: flex-end;
    }

    /* --- Compact density --- */
    .ds-card.compact .ds-card-header {
      padding: var(--space-2) var(--space-3);
      gap: var(--space-2);
    }
    .ds-card.compact .ds-card-header-title { font-size: var(--font-size-sm); }
    .ds-card.compact .ds-card-header-subtitle { font-size: var(--font-size-xs); }
    .ds-card.compact .ds-card-content {
      padding: 0 var(--space-3) var(--space-2);
      font-size: var(--font-size-xs);
    }
    .ds-card.compact .ds-card-footer {
      padding: var(--space-2) var(--space-3);
      gap: var(--space-1);
    }
    .ds-card.compact .ds-card-metric { padding: var(--space-2) var(--space-3); }
    .ds-card.compact .ds-card-metric-value { font-size: var(--font-size-lg); }
    .ds-card.compact .ds-card-profile { padding: var(--space-2) var(--space-3); gap: var(--space-2); }
    .ds-card.compact .ds-card-profile-avatar { width: 32px; height: 32px; font-size: var(--font-size-xs); }
    .ds-card.compact .ds-card-list-item { padding: var(--space-2) var(--space-3); gap: var(--space-2); }
    .ds-card.compact .ds-card-list-item-icon { width: 24px; height: 24px; }
    .ds-card.compact .ds-card-list-item-icon svg { width: 12px; height: 12px; }
    .ds-card.compact .ds-card-list-item-icon .material-symbols-rounded { font-size: 12px; }
    .ds-card.compact .ds-card-media.fixed-height { height: 100px; }

    /* --- Comfortable density --- */
    .ds-card.comfortable .ds-card-header {
      padding: var(--space-5) var(--space-6);
      gap: var(--space-4);
    }
    .ds-card.comfortable .ds-card-header-title { font-size: var(--font-size-lg); }
    .ds-card.comfortable .ds-card-header-subtitle { font-size: var(--font-size-base); }
    .ds-card.comfortable .ds-card-content {
      padding: 0 var(--space-6) var(--space-5);
      font-size: var(--font-size-base);
    }
    .ds-card.comfortable .ds-card-footer {
      padding: var(--space-4) var(--space-6);
      gap: var(--space-3);
    }
    .ds-card.comfortable .ds-card-metric { padding: var(--space-5) var(--space-6); }
    .ds-card.comfortable .ds-card-metric-value { font-size: var(--font-size-3xl); }
    .ds-card.comfortable .ds-card-profile { padding: var(--space-5) var(--space-6); gap: var(--space-4); }
    .ds-card.comfortable .ds-card-profile-avatar { width: 48px; height: 48px; font-size: var(--font-size-base); }
    .ds-card.comfortable .ds-card-list-item { padding: var(--space-4) var(--space-6); gap: var(--space-4); }
    .ds-card.comfortable .ds-card-list-item-icon { width: 40px; height: 40px; }
    .ds-card.comfortable .ds-card-list-item-icon svg { width: 20px; height: 20px; }
    .ds-card.comfortable .ds-card-list-item-icon .material-symbols-rounded { font-size: 20px; }
    .ds-card.comfortable .ds-card-media.fixed-height { height: 200px; }

    /* Metric content type */
    .ds-card-metric {
      padding: var(--space-4) var(--space-5);
    }
    .ds-card-metric-value {
      font-size: var(--font-size-2xl);
      font-weight: var(--font-weight-bold);
      color: var(--content-primary);
      line-height: 1.2;
    }
    .ds-card-metric-label {
      font-size: var(--font-size-sm);
      color: var(--content-secondary);
      margin-top: 2px;
    }
    .ds-card-metric-trend {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      font-size: var(--font-size-xs);
      font-weight: var(--font-weight-medium);
      margin-top: var(--space-2);
      padding: 2px 8px;
      border-radius: var(--radius-full);
    }
    .ds-card-metric-trend.up { background-color: var(--success-tonal-bg); color: var(--success-tonal-fg); }
    .ds-card-metric-trend.down { background-color: var(--danger-tonal-bg); color: var(--danger-tonal-fg); }

    /* Profile content type */
    .ds-card-profile {
      display: flex;
      align-items: center;
      gap: var(--space-3);
      padding: var(--space-4) var(--space-5);
    }
    .ds-card-profile-avatar {
      width: 40px;
      height: 40px;
      border-radius: var(--radius-full);
      background-color: var(--primary-tonal-bg);
      color: var(--primary-tonal-fg);
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: var(--font-weight-semibold);
      font-size: var(--font-size-sm);
      flex-shrink: 0;
    }
    .ds-card-profile-info { flex: 1; min-width: 0; }
    .ds-card-profile-name {
      font-size: var(--font-size-sm);
      font-weight: var(--font-weight-semibold);
      color: var(--content-primary);
    }
    .ds-card-profile-role {
      font-size: var(--font-size-xs);
      color: var(--content-tertiary);
    }

    /* List-item content type */
    .ds-card-list-item {
      display: flex;
      align-items: center;
      gap: var(--space-3);
      padding: var(--space-3) var(--space-5);
    }
    .ds-card-list-item-icon {
      width: 32px;
      height: 32px;
      border-radius: var(--radius-sm);
      background-color: var(--neutral-tonal-bg);
      color: var(--neutral-tonal-fg);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .ds-card-list-item-icon svg { width: 16px; height: 16px; }
    .ds-card-list-item-icon .material-symbols-rounded { font-size: 16px; }
    .ds-card-list-item-text { flex: 1; min-width: 0; }
    .ds-card-list-item-title {
      font-size: var(--font-size-sm);
      font-weight: var(--font-weight-medium);
      color: var(--content-primary);
    }
    .ds-card-list-item-meta {
      font-size: var(--font-size-xs);
      color: var(--content-tertiary);
    }
    .ds-card-list-item-trailing {
      font-size: var(--font-size-xs);
      color: var(--content-tertiary);
      flex-shrink: 0;
    }

    /* TABS */
    .ds-tabs {
      display: flex;
      gap: 0;
      box-shadow: inset 0 -1px 0 0 var(--border-subtle);
      overflow-x: auto;
      scrollbar-width: none;
    }

    .ds-tabs::-webkit-scrollbar { display: none; }

    .ds-tab {
      position: relative;
      padding: var(--space-3) var(--space-4);
      border: none;
      background: transparent;
      font-family: var(--font-sans);
      font-weight: var(--font-weight-medium);
      color: var(--content-tertiary);
      cursor: pointer;
      white-space: nowrap;
      display: inline-flex;
      align-items: center;
      gap: var(--space-2);
      transition: color var(--motion-fast) var(--ease-standard);
    }

    .ds-tab::after {
      content: '';
      position: absolute;
      bottom: 0;
      inset-inline-start: var(--space-4);
      inset-inline-end: var(--space-4);
      height: 2px;
      background-color: transparent;
      border-radius: 1px 1px 0 0;
      transition: background-color var(--motion-fast) var(--ease-standard);
    }

    .ds-tab:hover { color: var(--content-primary); }

    .ds-tab.active {
      color: var(--primary-ghost-fg);
      font-weight: var(--font-weight-semibold);
    }

    .ds-tab.active::after {
      background-color: var(--primary-filled-bg);
    }

    .ds-tab.sm { padding: var(--space-2) var(--space-3); font-size: var(--font-size-xs); }
    .ds-tab.md { padding: var(--space-3) var(--space-4); font-size: var(--font-size-sm); }
    .ds-tab.lg { padding: var(--space-3-5) var(--space-5); font-size: var(--font-size-base); }

    .ds-tab:disabled {
      color: var(--content-disabled);
      cursor: not-allowed;
    }

    .ds-tab:focus-visible { outline: none; box-shadow: inset 0 0 0 2px var(--primary-filled-bg); }
    .ds-tab svg { width: 1em; height: 1em; }

    .ds-tab .material-symbols-rounded { font-size: 1em; }

    .ds-tab-badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 18px;
      height: 18px;
      padding: 0 var(--space-1);
      border-radius: var(--radius-full);
      background-color: var(--danger-filled-bg);
      color: var(--danger-filled-fg);
      font-family: var(--font-sans);
      font-size: var(--font-size-xs);
      font-weight: var(--font-weight-semibold);
    }

    /* BREADCRUMB */
    .ds-breadcrumb {
      display: flex;
      align-items: center;
      gap: var(--space-1);
      font-family: var(--font-sans);
      flex-wrap: nowrap;
      overflow: hidden;
      list-style: none;
      margin: 0;
      padding: 0;
    }

    .ds-breadcrumb.sm { font-size: var(--font-size-xs); }
    .ds-breadcrumb.md { font-size: var(--font-size-sm); }
    .ds-breadcrumb.lg { font-size: var(--font-size-base); }

    .ds-breadcrumb-item {
      color: var(--content-tertiary);
      text-decoration: none;
      cursor: pointer;
      transition: color var(--motion-fast) var(--ease-standard), background-color var(--motion-fast) var(--ease-standard);
      padding: var(--space-1) var(--space-1-5);
      border-radius: var(--radius-xs);
      border: none;
      background: none;
      font-family: inherit;
      font-size: inherit;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 160px;
      flex-shrink: 0;
    }

    .ds-breadcrumb-item:hover { color: var(--content-primary); background-color: var(--neutral-tonal-bg); }
    .ds-breadcrumb-item:focus-visible { outline: none; box-shadow: 0 0 0 2px var(--primary-filled-bg); }
    .ds-breadcrumb-item.current {
      color: var(--content-primary);
      font-weight: var(--font-weight-medium);
      cursor: default;
    }
    .ds-breadcrumb-item.current:hover { background-color: transparent; }

    .ds-breadcrumb li { display: flex; align-items: center; }
    .ds-breadcrumb-separator {
      color: var(--content-disabled);
      display: flex;
      align-items: center;
      flex-shrink: 0;
    }

    .ds-breadcrumb-separator svg { width: 14px; height: 14px; }

    .ds-breadcrumb-separator .material-symbols-rounded { font-size: 14px; }

    .ds-breadcrumb-ellipsis {
      color: var(--content-tertiary);
      cursor: pointer;
      padding: var(--space-1) var(--space-1-5);
      border-radius: var(--radius-xs);
      border: none;
      background: none;
      font-family: inherit;
      font-size: inherit;
      font-weight: var(--font-weight-bold);
      letter-spacing: 2px;
      flex-shrink: 0;
      transition: color var(--motion-fast) var(--ease-standard), background-color var(--motion-fast) var(--ease-standard);
      position: relative;
    }
    .ds-breadcrumb-ellipsis:hover { color: var(--content-primary); background-color: var(--neutral-tonal-bg); }
    .ds-breadcrumb-ellipsis:focus-visible { outline: none; box-shadow: 0 0 0 2px var(--primary-filled-bg); }

    .ds-breadcrumb-overflow {
      position: absolute;
      top: calc(100% + var(--space-2));
      inset-inline-start: 0;
      background-color: var(--surface-overlay);
      border-radius: var(--radius-md);
      box-shadow: inset 0 0 0 1px var(--border-subtle), var(--shadow-md);
      padding: var(--space-1);
      min-width: 160px;
      z-index: 10;
      display: flex;
      flex-direction: column;
      gap: var(--space-0-5);
    }

    .ds-breadcrumb-overflow-item {
      color: var(--content-secondary);
      padding: var(--space-1-5) var(--space-2);
      border-radius: var(--radius-sm);
      border: none;
      background: none;
      font-family: inherit;
      font-size: inherit;
      cursor: pointer;
      text-align: start;
      white-space: nowrap;
      transition: background-color var(--motion-fast) var(--ease-standard), color var(--motion-fast) var(--ease-standard);
    }
    .ds-breadcrumb-overflow-item:hover { background-color: var(--neutral-tonal-bg); color: var(--content-primary); }
    .ds-breadcrumb-overflow-item:focus-visible { outline: none; box-shadow: inset 0 0 0 2px var(--primary-filled-bg); }

    /* NAV RAIL */
    .ds-nav-rail {
      display: flex;
      flex-direction: column;
      background-color: var(--surface-default);
      border-inline-end: 1px solid var(--border-subtle);
      height: 320px;
      overflow: hidden;
      transition: width var(--motion-normal) var(--ease-standard);
    }

    .ds-nav-rail.collapsed { width: 56px; }
    .ds-nav-rail.expanded { width: 220px; }

    .ds-nav-rail-header {
      padding: var(--space-3);
      display: flex;
      align-items: center;
      justify-content: space-between;
      box-shadow: inset 0 -1px 0 0 var(--border-subtle);
      min-height: 48px;
    }

    .ds-nav-rail-logo {
      font-size: var(--font-size-base);
      font-weight: var(--font-weight-bold);
      color: var(--primary-filled-bg);
      white-space: nowrap;
      overflow: hidden;
    }

    .ds-nav-rail.collapsed .ds-nav-rail-logo { display: none; }

    .ds-nav-rail-toggle {
      width: 32px;
      height: 32px;
      border: none;
      background: none;
      color: var(--content-secondary);
      cursor: pointer;
      border-radius: var(--radius-sm);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: background-color var(--motion-fast) var(--ease-standard);
    }

    .ds-nav-rail-toggle:hover { background-color: var(--neutral-tonal-bg); }
    .ds-nav-rail-toggle:focus-visible { outline: none; box-shadow: 0 0 0 2px var(--primary-filled-bg); }
    .ds-nav-rail-toggle svg { width: 18px; height: 18px; }

    .ds-nav-rail-toggle .material-symbols-rounded { font-size: 18px; }

    .ds-nav-rail-items {
      flex: 1;
      padding: var(--space-2);
      display: flex;
      flex-direction: column;
      gap: var(--space-1);
      overflow-y: auto;
    }

    .ds-nav-rail-item {
      display: flex;
      align-items: center;
      gap: var(--space-3);
      padding: var(--space-2-5) var(--space-3);
      border: none;
      background: transparent;
      color: var(--content-secondary);
      font-family: var(--font-sans);
      font-size: var(--font-size-sm);
      font-weight: var(--font-weight-medium);
      cursor: pointer;
      border-radius: var(--radius-md);
      white-space: nowrap;
      overflow: hidden;
      transition: all var(--motion-fast) var(--ease-standard);
      position: relative;
    }

    .ds-nav-rail-item:hover { background-color: var(--neutral-tonal-bg); color: var(--content-primary); }
    .ds-nav-rail-item:focus-visible { outline: none; box-shadow: inset 0 0 0 2px var(--primary-filled-bg); }

    .ds-nav-rail-item.active {
      background-color: var(--primary-tonal-bg);
      color: var(--primary-tonal-fg);
      font-weight: var(--font-weight-semibold);
    }

    .ds-nav-rail-item svg { width: 20px; height: 20px; flex-shrink: 0; }

    .ds-nav-rail-item .material-symbols-rounded { font-size: 20px; }

    .ds-nav-rail-item span:not(.material-symbols-rounded) { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

    .ds-nav-rail.collapsed .ds-nav-rail-item { justify-content: center; padding: var(--space-2-5); }
    .ds-nav-rail.collapsed .ds-nav-rail-item span:not(.material-symbols-rounded) { display: none; }

    .ds-nav-rail-item-badge {
      margin-inline-start: auto;
      min-width: 18px;
      height: 18px;
      padding: 0 var(--space-1);
      border-radius: var(--radius-full);
      background-color: var(--danger-filled-bg);
      color: var(--danger-filled-fg);
      font-size: 10px;
      font-weight: var(--font-weight-semibold);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .ds-nav-rail.collapsed .ds-nav-rail-item-badge { display: none; }

    .ds-nav-rail.collapsed .ds-nav-rail-header { justify-content: center; }

    /* BOTTOM NAV */
    .ds-bottom-nav {
      display: flex;
      align-items: stretch;
      background-color: var(--surface-default);
      box-shadow: inset 0 1px 0 0 var(--border-subtle);
      width: 100%;
      max-width: 375px;
      height: 56px;
    }

    .ds-bottom-nav-item {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: var(--space-0-5);
      border: none;
      background: transparent;
      color: var(--content-tertiary);
      font-family: var(--font-sans);
      font-size: var(--font-size-xs);
      font-weight: var(--font-weight-medium);
      cursor: pointer;
      position: relative;
      transition: color var(--motion-fast) var(--ease-standard);
    }

    .ds-bottom-nav-item:hover { color: var(--content-secondary); }

    .ds-bottom-nav-item.active {
      color: var(--primary-filled-bg);
      font-weight: var(--font-weight-semibold);
    }

    .ds-bottom-nav-item:focus-visible { outline: none; box-shadow: inset 0 0 0 2px var(--primary-filled-bg); }
    .ds-bottom-nav-item svg { width: 22px; height: 22px; }

    .ds-bottom-nav-item .material-symbols-rounded { font-size: 22px; }

    .ds-bottom-nav-item-badge {
      position: absolute;
      top: var(--space-1);
      inset-inline-start: calc(50% + 6px);
      min-width: 14px;
      height: 14px;
      padding: 0 var(--space-0-5);
      border-radius: var(--radius-full);
      background-color: var(--danger-filled-bg);
      color: var(--danger-filled-fg);
      font-family: var(--font-sans);
      font-size: var(--font-size-xs);
      font-weight: var(--font-weight-bold);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* PANEL */
    .ds-panel {
      display: flex;
      flex-direction: column;
      background-color: var(--surface-raised);
      box-shadow: var(--shadow-lg);
      border-radius: var(--radius-lg);
      overflow: hidden;
      max-height: 100%;
    }

    .ds-panel.outlined {
      background-color: var(--surface-default);
      box-shadow: inset 0 0 0 1px var(--border-subtle);
    }

    .ds-panel-header {
      display: flex;
      align-items: center;
      gap: var(--space-3);
      padding: var(--space-4) var(--space-5);
      box-shadow: inset 0 -1px 0 0 var(--border-subtle);
      flex-shrink: 0;
    }

    .ds-panel-header-title {
      font-family: var(--font-sans);
      font-size: var(--font-size-base);
      font-weight: var(--font-weight-semibold);
      color: var(--content-primary);
      flex: 1;
    }

    .ds-panel-header-actions {
      display: flex;
      gap: var(--space-1);
      align-items: center;
    }

    .ds-panel-content {
      flex: 1;
      overflow-y: auto;
      padding: var(--space-4) var(--space-5);
      font-family: var(--font-sans);
      font-size: var(--font-size-sm);
      color: var(--content-secondary);
      line-height: var(--line-height-normal);
    }

    .ds-panel-footer {
      display: flex;
      justify-content: flex-end;
      gap: var(--space-3);
      padding: var(--space-3) var(--space-5);
      box-shadow: inset 0 1px 0 0 var(--border-subtle);
      flex-shrink: 0;
    }

    .ds-panel.compact .ds-panel-header { padding: var(--space-3) var(--space-4); }
    .ds-panel.compact .ds-panel-content { padding: var(--space-3) var(--space-4); font-size: var(--font-size-xs); }
    .ds-panel.compact .ds-panel-footer { padding: var(--space-2) var(--space-4); }
    .ds-panel.compact .ds-panel-header-title { font-size: var(--font-size-sm); }

    .ds-panel.comfortable .ds-panel-header { padding: var(--space-5) var(--space-6); }
    .ds-panel.comfortable .ds-panel-content { padding: var(--space-5) var(--space-6); }
    .ds-panel.comfortable .ds-panel-footer { padding: var(--space-4) var(--space-6); }
    .ds-panel.comfortable .ds-panel-header-title { font-size: var(--font-size-lg); }

    .ds-panel-drag-handle {
      width: 36px;
      height: 4px;
      border-radius: var(--radius-full);
      background-color: var(--border-default);
      margin: var(--space-2) auto;
    }

    /* DIALOG */
    .ds-dialog-backdrop {
      position: absolute;
      inset: 0;
      background-color: var(--surface-overlay);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100;
    }

    /* For demo: fill the preview-grid container */
    .ds-dialog-backdrop.demo {
      position: absolute;
      inset: 0;
      border-radius: inherit;
    }

    .ds-dialog {
      background-color: var(--surface-raised);
      box-shadow: var(--shadow-xl);
      border-radius: var(--radius-xl);
      display: flex;
      flex-direction: column;
      max-width: 560px;
      width: 90%;
      max-height: 80vh;
      overflow: hidden;
      animation: dialogEnter var(--motion-normal) var(--ease-enter) both;
    }

    @keyframes dialogEnter {
      from { opacity: 0; transform: scale(0.95) translateY(8px); }
      to { opacity: 1; transform: scale(1) translateY(0); }
    }

    .ds-dialog-header {
      display: flex;
      align-items: center;
      gap: var(--space-3);
      padding: var(--space-5) var(--space-6);
      flex-shrink: 0;
    }

    .ds-dialog-header-title {
      font-family: var(--font-sans);
      font-size: var(--font-size-lg);
      font-weight: var(--font-weight-semibold);
      color: var(--content-primary);
      flex: 1;
    }

    .ds-dialog-content {
      padding: 0 var(--space-6) var(--space-5);
      font-family: var(--font-sans);
      font-size: var(--font-size-sm);
      color: var(--content-secondary);
      line-height: var(--line-height-normal);
      overflow-y: auto;
      flex: 1;
    }

    .ds-dialog-footer {
      display: flex;
      justify-content: flex-end;
      gap: var(--space-3);
      padding: var(--space-4) var(--space-6);
      box-shadow: inset 0 1px 0 0 var(--border-subtle);
      flex-shrink: 0;
    }

    .ds-dialog.compact .ds-dialog-header { padding: var(--space-4) var(--space-5); }
    .ds-dialog.compact .ds-dialog-header-title { font-size: var(--font-size-base); }
    .ds-dialog.compact .ds-dialog-content { padding: 0 var(--space-5) var(--space-3); font-size: var(--font-size-xs); }
    .ds-dialog.compact .ds-dialog-footer { padding: var(--space-3) var(--space-5); }

    .ds-dialog.comfortable .ds-dialog-header { padding: var(--space-6) var(--space-7); }
    .ds-dialog.comfortable .ds-dialog-header-title { font-size: var(--font-size-xl); }
    .ds-dialog.comfortable .ds-dialog-content { padding: 0 var(--space-7) var(--space-6); }
    .ds-dialog.comfortable .ds-dialog-footer { padding: var(--space-5) var(--space-7); }

    /* ALERT */
    .ds-alert {
      display: flex;
      align-items: flex-start;
      gap: var(--space-3);
      padding: var(--space-4);
      border-radius: var(--radius-md);
      font-family: var(--font-sans);
      font-size: var(--font-size-sm);
      line-height: var(--line-height-normal);
    }

    .ds-alert-icon {
      width: 20px;
      height: 20px;
      flex-shrink: 0;
      margin-top: 1px;
    }

    .ds-alert-icon svg { width: 100%; height: 100%; }

    .ds-alert-icon .material-symbols-rounded { font-size: 100%; }

    .ds-alert-body { flex: 1; display: flex; flex-direction: column; gap: var(--space-1); }

    .ds-alert-title {
      font-weight: var(--font-weight-semibold);
      font-size: var(--font-size-sm);
    }

    .ds-alert-desc {
      font-size: var(--font-size-xs);
      opacity: 0.8;
      line-height: var(--line-height-normal);
    }

    .ds-alert-actions {
      display: flex;
      gap: var(--space-2);
      margin-top: var(--space-2);
    }

    .ds-alert-dismiss {
      width: 20px;
      height: 20px;
      flex-shrink: 0;
      border: none;
      background: none;
      color: inherit;
      cursor: pointer;
      padding: 0;
      opacity: 0.7;
      border-radius: var(--radius-sm);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .ds-alert-dismiss:hover { opacity: 1; }
    .ds-alert-dismiss svg { width: 16px; height: 16px; }

    .ds-alert-dismiss .material-symbols-rounded { font-size: 16px; }

    /* Alert role variable-scope modifiers (specificity: 0-2-0) */
    .ds-alert.danger { --_filled-bg: var(--danger-filled-bg); --_filled-fg: var(--danger-filled-fg); --_tonal-bg: var(--danger-tonal-bg); --_tonal-fg: var(--danger-tonal-fg); --_outline-fg: var(--danger-outline-fg); --_outline-border: var(--danger-outline-border); }
    .ds-alert.warning { --_filled-bg: var(--warning-filled-bg); --_filled-fg: var(--warning-filled-fg); --_tonal-bg: var(--warning-tonal-bg); --_tonal-fg: var(--warning-tonal-fg); --_outline-fg: var(--warning-outline-fg); --_outline-border: var(--warning-outline-border); }
    .ds-alert.success { --_filled-bg: var(--success-filled-bg); --_filled-fg: var(--success-filled-fg); --_tonal-bg: var(--success-tonal-bg); --_tonal-fg: var(--success-tonal-fg); --_outline-fg: var(--success-outline-fg); --_outline-border: var(--success-outline-border); }
    .ds-alert.neutral { --_filled-bg: var(--neutral-filled-bg); --_filled-fg: var(--neutral-filled-fg); --_tonal-bg: var(--neutral-tonal-bg); --_tonal-fg: var(--neutral-tonal-fg); --_outline-fg: var(--neutral-outline-fg); --_outline-border: var(--neutral-outline-border); }
    .ds-alert.ai { --_filled-bg: var(--ai-filled-bg); --_filled-fg: var(--ai-filled-fg); --_tonal-bg: var(--ai-tonal-bg); --_tonal-fg: var(--ai-tonal-fg); --_outline-fg: var(--ai-outline-fg); --_outline-border: var(--ai-outline-border); }

    /* Alert style consumers (specificity: 0-2-0) */
    .ds-alert.tonal { background-color: var(--_tonal-bg); color: var(--_tonal-fg); }
    .ds-alert.filled { background-color: var(--_filled-bg); color: var(--_filled-fg); }
    .ds-alert.outlined { background-color: transparent; color: var(--_outline-fg); box-shadow: inset 0 0 0 1px var(--_outline-border); }

    /* SNACKBAR */
    .ds-snackbar {
      display: flex;
      align-items: center;
      gap: var(--space-3);
      padding: var(--space-3) var(--space-4);
      border-radius: var(--radius-md);
      font-family: var(--font-sans);
      font-size: var(--font-size-sm);
      max-width: 400px;
      width: 100%;
      box-shadow: var(--shadow-lg);
      animation: snackbarEnter var(--motion-fast) var(--ease-spring) both;
    }

    @keyframes snackbarEnter {
      from { opacity: 0; transform: translateY(16px) scale(0.95); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }

    .ds-snackbar-icon {
      width: 20px;
      height: 20px;
      flex-shrink: 0;
    }
    .ds-snackbar-icon svg { width: 100%; height: 100%; }

    .ds-snackbar-icon .material-symbols-rounded { font-size: 100%; }

    .ds-snackbar-message { flex: 1; font-weight: var(--font-weight-medium); }

    .ds-snackbar-action {
      border: none;
      background: none;
      color: inherit;
      font-family: var(--font-sans);
      font-size: var(--font-size-sm);
      font-weight: var(--font-weight-semibold);
      cursor: pointer;
      padding: var(--space-1) var(--space-2);
      border-radius: var(--radius-sm);
      opacity: 0.9;
      white-space: nowrap;
      position: relative;
    }
    .ds-snackbar-action::before { content: ''; position: absolute; inset: 0; border-radius: inherit; background-color: currentColor; opacity: 0; transition: opacity var(--motion-fast) var(--ease-standard); pointer-events: none; }
    .ds-snackbar-action:hover { opacity: 1; }
    .ds-snackbar-action:hover::before { opacity: 0.15; }
    .ds-snackbar-action:focus-visible { outline: none; box-shadow: 0 0 0 2px currentColor; }

    .ds-snackbar-dismiss {
      width: 20px;
      height: 20px;
      flex-shrink: 0;
      border: none;
      background: none;
      color: inherit;
      cursor: pointer;
      padding: 0;
      opacity: 0.7;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .ds-snackbar-dismiss:hover { opacity: 1; }
    .ds-snackbar-dismiss svg { width: 16px; height: 16px; }

    .ds-snackbar-dismiss .material-symbols-rounded { font-size: 16px; }

    .ds-snackbar.danger { background-color: var(--danger-filled-bg); color: var(--danger-filled-fg); }
    .ds-snackbar.warning { background-color: var(--warning-filled-bg); color: var(--warning-filled-fg); }
    .ds-snackbar.success { background-color: var(--success-filled-bg); color: var(--success-filled-fg); }
    .ds-snackbar.neutral { background-color: var(--neutral-filled-bg); color: var(--neutral-filled-fg); }

    /* TOAST */
    .ds-toast {
      display: flex;
      background-color: var(--surface-raised);
      box-shadow: var(--shadow-md);
      border-radius: var(--radius-lg);
      overflow: hidden;
      max-width: 380px;
      width: 100%;
      animation: toastEnter var(--motion-fast) var(--ease-spring) both;
    }

    @keyframes toastEnter {
      from { opacity: 0; transform: translateX(24px); }
      to { opacity: 1; transform: translateX(0); }
    }

    .ds-toast-accent {
      width: 5px;
      flex-shrink: 0;
    }

    .ds-toast-accent.danger { background-color: var(--danger-filled-bg); }
    .ds-toast-accent.warning { background-color: var(--warning-filled-bg); }
    .ds-toast-accent.success { background-color: var(--success-filled-bg); }
    .ds-toast-accent.neutral { background-color: var(--neutral-filled-bg); }
    .ds-toast-accent.ai { background-color: var(--ai-filled-bg); }

    .ds-toast-body {
      flex: 1;
      display: flex;
      align-items: flex-start;
      gap: var(--space-3);
      padding: var(--space-4);
    }

    .ds-toast-icon {
      width: 20px;
      height: 20px;
      flex-shrink: 0;
      margin-top: 1px;
    }
    .ds-toast-icon svg { width: 100%; height: 100%; }

    .ds-toast-icon .material-symbols-rounded { font-size: 100%; }

    .ds-toast-icon.danger { color: var(--danger-tonal-fg); }
    .ds-toast-icon.warning { color: var(--warning-tonal-fg); }
    .ds-toast-icon.success { color: var(--success-tonal-fg); }
    .ds-toast-icon.neutral { color: var(--neutral-tonal-fg); }
    .ds-toast-icon.ai { color: var(--ai-tonal-fg); }

    /* Toast title inherits role color for visible distinction */
    .ds-toast.role-danger .ds-toast-title { color: var(--danger-tonal-fg); }
    .ds-toast.role-warning .ds-toast-title { color: var(--warning-tonal-fg); }
    .ds-toast.role-success .ds-toast-title { color: var(--success-tonal-fg); }
    .ds-toast.role-neutral .ds-toast-title { color: var(--content-primary); }
    .ds-toast.role-ai .ds-toast-title { color: var(--ai-tonal-fg); }

    .ds-toast-content { flex: 1; display: flex; flex-direction: column; gap: var(--space-1); }

    .ds-toast-title {
      font-family: var(--font-sans);
      font-size: var(--font-size-sm);
      font-weight: var(--font-weight-semibold);
      color: var(--content-primary);
    }

    .ds-toast-desc {
      font-family: var(--font-sans);
      font-size: var(--font-size-xs);
      color: var(--content-secondary);
      line-height: var(--line-height-normal);
    }

    .ds-toast-actions {
      display: flex;
      gap: var(--space-2);
      margin-top: var(--space-2);
    }

    .ds-toast-dismiss {
      width: 20px;
      height: 20px;
      flex-shrink: 0;
      border: none;
      background: none;
      color: var(--content-tertiary);
      cursor: pointer;
      padding: 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .ds-toast-dismiss:hover { color: var(--content-primary); }
    .ds-toast-dismiss:focus-visible { outline: none; box-shadow: 0 0 0 2px var(--primary-filled-bg); }
    .ds-toast-dismiss svg { width: 16px; height: 16px; }

    .ds-toast-dismiss .material-symbols-rounded { font-size: 16px; }

    /* Toast stacking demo */
    .ds-toast-stack {
      display: flex;
      flex-direction: column;
      gap: var(--space-3);
      align-items: flex-end;
    }

    /* TOOLTIP */
    .ds-tooltip-demo {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 160px;
      padding: var(--space-8) var(--space-6);
      position: relative;
    }

    .ds-tooltip-anchor {
      display: inline-flex;
      align-items: center;
      gap: var(--space-2);
      padding: var(--space-2) var(--space-3);
      border: 1px dashed var(--border-subtle);
      border-radius: var(--radius-md);
      font-family: var(--font-sans);
      font-size: var(--font-size-sm);
      color: var(--content-secondary);
      cursor: default;
    }

    .ds-tooltip {
      position: absolute;
      background-color: var(--neutral-filled-bg);
      color: var(--neutral-filled-fg);
      font-family: var(--font-sans);
      font-size: var(--font-size-xs);
      padding: var(--space-1-5) var(--space-2-5);
      border-radius: var(--radius-sm);
      box-shadow: var(--shadow-sm);
      white-space: nowrap;
      pointer-events: none;
      line-height: var(--line-height-snug);
      z-index: 10;
    }

    .ds-tooltip.rich {
      white-space: normal;
      max-width: 320px;
      min-width: 200px;
      padding: var(--space-3) var(--space-4);
    }

    .ds-tooltip-title {
      font-weight: var(--font-weight-semibold);
      font-size: var(--font-size-xs);
      margin-bottom: var(--space-1);
    }

    .ds-tooltip-desc {
      font-size: var(--font-size-xs);
      opacity: 0.85;
      line-height: var(--line-height-normal);
    }

    .ds-tooltip-arrow {
      position: absolute;
      width: 8px;
      height: 8px;
      background-color: var(--neutral-filled-bg);
      transform: rotate(45deg);
    }

    .ds-tooltip.pos-top { bottom: calc(100% + 10px); left: 50%; transform: translateX(-50%); }
    .ds-tooltip.pos-top .ds-tooltip-arrow { bottom: -4px; left: 50%; margin-left: -4px; }
    .ds-tooltip.pos-bottom { top: calc(100% + 10px); left: 50%; transform: translateX(-50%); }
    .ds-tooltip.pos-bottom .ds-tooltip-arrow { top: -4px; left: 50%; margin-left: -4px; }
    .ds-tooltip.pos-start { inset-inline-end: calc(100% + 10px); top: 50%; transform: translateY(-50%); }
    .ds-tooltip.pos-start .ds-tooltip-arrow { inset-inline-end: -4px; top: 50%; margin-top: -4px; }
    .ds-tooltip.pos-end { inset-inline-start: calc(100% + 10px); top: 50%; transform: translateY(-50%); }
    .ds-tooltip.pos-end .ds-tooltip-arrow { inset-inline-start: -4px; top: 50%; margin-top: -4px; }

    /* POPOVER */
    .ds-popover-demo {
      display: flex;
      align-items: flex-start;
      gap: var(--space-4);
      min-height: 200px;
      position: relative;
    }

    .ds-popover {
      background-color: var(--surface-raised);
      box-shadow: var(--shadow-lg);
      border-radius: var(--radius-lg);
      overflow: hidden;
      min-width: 240px;
      max-width: 320px;
      animation: popoverEnter var(--motion-fast) var(--ease-enter) both;
    }

    @keyframes popoverEnter {
      from { opacity: 0; transform: translateY(-4px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .ds-popover-content {
      padding: var(--space-4);
      font-family: var(--font-sans);
      font-size: var(--font-size-sm);
      color: var(--content-secondary);
      line-height: var(--line-height-normal);
      display: flex;
      flex-direction: column;
      gap: var(--space-3);
    }

    .ds-popover.compact .ds-popover-content {
      padding: var(--space-3);
      font-size: var(--font-size-xs);
    }

    .ds-popover-title {
      font-size: var(--font-size-sm);
      font-weight: var(--font-weight-semibold);
      color: var(--content-primary);
    }

    /* MENU */
    .ds-menu {
      background-color: var(--surface-raised);
      box-shadow: var(--shadow-lg);
      border-radius: var(--radius-md);
      overflow: hidden;
      min-width: 200px;
      max-width: 280px;
      padding: var(--space-1) 0;
      animation: popoverEnter var(--motion-fast) var(--ease-enter) both;
    }

    .ds-menu-header {
      padding: var(--space-2) var(--space-4);
      font-family: var(--font-sans);
      font-size: var(--font-size-xs);
      font-weight: var(--font-weight-semibold);
      color: var(--content-tertiary);
      text-transform: uppercase;
      letter-spacing: var(--tracking-wider);
    }

    .ds-menu-item {
      display: flex;
      align-items: center;
      gap: var(--space-3);
      padding: var(--space-2) var(--space-4);
      font-family: var(--font-sans);
      font-size: var(--font-size-sm);
      color: var(--content-primary);
      cursor: pointer;
      border: none;
      background: none;
      width: 100%;
      text-align: start;
      transition: background-color var(--motion-fast) var(--ease-standard);
    }

    .ds-menu-item:hover, .ds-menu-item.hover {
      background-color: var(--neutral-tonal-bg);
    }

    .ds-menu-item.selected {
      background-color: var(--primary-tonal-bg);
      color: var(--primary-tonal-fg);
    }

    .ds-menu-item.danger {
      color: var(--danger-outline-fg);
    }
    .ds-menu-item.danger:hover, .ds-menu-item.danger.hover {
      background-color: var(--danger-tonal-bg);
      color: var(--danger-tonal-fg);
    }

    .ds-menu-item.disabled {
      color: var(--content-disabled);
      cursor: not-allowed;
    }
    .ds-menu-item.disabled:hover { background: none; }
    .ds-menu-item:focus-visible { outline: none; box-shadow: inset 0 0 0 2px var(--primary-filled-bg); }

    .ds-menu-item-icon { width: 18px; height: 18px; flex-shrink: 0; }
    .ds-menu-item-icon svg { width: 100%; height: 100%; }

    .ds-menu-item-icon .material-symbols-rounded { font-size: 100%; }

    .ds-menu-item-label { flex: 1; }

    .ds-menu-item-shortcut {
      font-size: var(--font-size-xs);
      color: var(--content-tertiary);
      font-family: var(--font-mono);
    }

    .ds-menu-item-check { width: 16px; height: 16px; flex-shrink: 0; color: var(--primary-filled-bg); }
    .ds-menu-item-check svg { width: 100%; height: 100%; }

    .ds-menu-item-check .material-symbols-rounded { font-size: 100%; }

    .ds-menu-divider { height: 1px; background-color: var(--border-subtle); margin: var(--space-1) 0; }

    /* TEXT FIELD */
    .ds-text-field-wrapper {
      display: flex;
      flex-direction: column;
      gap: var(--space-1-5);
      width: 100%;
      max-width: 320px;
    }

    .ds-text-field-label {
      font-family: var(--font-sans);
      font-size: var(--font-size-xs);
      font-weight: var(--font-weight-medium);
      color: var(--content-secondary);
      transition: color var(--motion-fast) var(--ease-standard);
    }
    .ds-text-field-wrapper.label-focused .ds-text-field-label { color: var(--primary-filled-bg); }
    .ds-text-field-wrapper.label-error .ds-text-field-label { color: var(--danger-outline-fg); }
    .ds-text-field-wrapper.label-disabled .ds-text-field-label { color: var(--content-disabled); }

    .ds-text-field {
      display: flex;
      align-items: center;
      gap: var(--space-2);
      font-family: var(--font-sans);
      background-color: var(--surface-default);
      border-radius: var(--radius-md);
      box-shadow: inset 0 0 0 1px var(--border-subtle);
      transition: box-shadow var(--motion-fast) var(--ease-standard);
      color: var(--content-primary);
    }

    .ds-text-field.sm { height: 32px; padding: 0 var(--space-2-5); font-size: var(--font-size-xs); }
    .ds-text-field.md { height: 40px; padding: 0 var(--space-3); font-size: var(--font-size-sm); }
    .ds-text-field.lg { height: 48px; padding: 0 var(--space-4); font-size: var(--font-size-base); }

    .ds-text-field.filled-style {
      background-color: var(--surface-sunken);
      box-shadow: inset 0 -2px 0 0 var(--border-subtle);
      border-radius: var(--radius-md) var(--radius-md) 0 0;
    }

    .ds-text-field:hover, .ds-text-field.hover {
      box-shadow: inset 0 0 0 1px var(--border-default);
    }
    .ds-text-field.filled-style:hover, .ds-text-field.filled-style.hover {
      box-shadow: inset 0 -2px 0 0 var(--border-default);
    }

    .ds-text-field.focused {
      box-shadow: inset 0 0 0 2px var(--primary-filled-bg);
    }
    .ds-text-field.filled-style.focused {
      box-shadow: inset 0 -2px 0 0 var(--primary-filled-bg);
    }

    .ds-text-field.error {
      box-shadow: inset 0 0 0 1px var(--danger-outline-border);
    }
    .ds-text-field.error:hover, .ds-text-field.error.hover {
      box-shadow: inset 0 0 0 1px var(--danger-outline-border);
    }
    .ds-text-field.filled-style.error {
      box-shadow: inset 0 -2px 0 0 var(--danger-outline-border);
    }
    .ds-text-field.filled-style.error:hover, .ds-text-field.filled-style.error.hover {
      box-shadow: inset 0 -2px 0 0 var(--danger-outline-border);
    }

    /* Focused + error: focus wins visually (2px danger ring) */
    .ds-text-field.focused.error {
      box-shadow: inset 0 0 0 2px var(--danger-outline-border);
    }
    .ds-text-field.filled-style.focused.error {
      box-shadow: inset 0 -2px 0 0 var(--danger-outline-border);
    }

    .ds-text-field.disabled { opacity: 0.5; cursor: not-allowed; color: var(--content-disabled); }
    .ds-text-field.disabled:hover, .ds-text-field.disabled.hover {
      box-shadow: inset 0 0 0 1px var(--border-subtle);
    }
    .ds-text-field.filled-style.disabled:hover, .ds-text-field.filled-style.disabled.hover {
      box-shadow: inset 0 -2px 0 0 var(--border-subtle);
    }

    .ds-text-field-input {
      flex: 1;
      border: none;
      background: none;
      outline: none;
      font-family: inherit;
      font-size: inherit;
      color: inherit;
      padding: 0;
      min-width: 0;
    }
    .ds-text-field-input::placeholder { color: var(--content-tertiary); }

    .ds-text-field-icon { flex-shrink: 0; color: var(--content-tertiary); }
    .ds-text-field-icon svg { width: 100%; height: 100%; }

    .ds-text-field-icon .material-symbols-rounded { font-size: 100%; }

    .ds-text-field.sm .ds-text-field-icon { width: 14px; height: 14px; }
    .ds-text-field.md .ds-text-field-icon { width: 18px; height: 18px; }
    .ds-text-field.lg .ds-text-field-icon { width: 20px; height: 20px; }

    .ds-text-field-helper {
      font-family: var(--font-sans);
      font-size: var(--font-size-xs);
      color: var(--content-tertiary);
    }

    .ds-text-field-error-text {
      font-family: var(--font-sans);
      font-size: var(--font-size-xs);
      color: var(--danger-outline-fg);
    }

    .ds-text-field-counter {
      font-family: var(--font-sans);
      font-size: var(--font-size-xs);
      color: var(--content-tertiary);
      flex-shrink: 0;
      white-space: nowrap;
    }

    .ds-text-field-wrapper.label-disabled .ds-text-field-helper,
    .ds-text-field-wrapper.label-disabled .ds-text-field-counter {
      color: var(--content-disabled);
    }

    .ds-text-field-bottom {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      gap: var(--space-2);
    }

    .ds-textarea {
      display: block;
      background-color: var(--surface-default);
      border-radius: var(--radius-md);
      box-shadow: inset 0 0 0 1px var(--border-subtle);
      transition: box-shadow var(--motion-fast) var(--ease-standard);
      padding: var(--space-3);
      box-sizing: border-box;
    }
    .ds-textarea.sm { padding: var(--space-2); }
    .ds-textarea.md { padding: var(--space-3); }
    .ds-textarea.lg { padding: var(--space-4); }
    .ds-textarea:hover, .ds-textarea.hover { box-shadow: inset 0 0 0 1px var(--border-default); }
    .ds-textarea.focused { box-shadow: inset 0 0 0 2px var(--primary-filled-bg); }
    .ds-textarea.error { box-shadow: inset 0 0 0 1px var(--danger-outline-border); }
    .ds-textarea.error:hover, .ds-textarea.error.hover { box-shadow: inset 0 0 0 1px var(--danger-outline-border); }
    .ds-textarea.focused.error { box-shadow: inset 0 0 0 2px var(--danger-outline-border); }
    .ds-textarea.disabled { opacity: 0.5; cursor: not-allowed; color: var(--content-disabled); }
    .ds-textarea.disabled:hover { box-shadow: inset 0 0 0 1px var(--border-subtle); }
    .ds-textarea.filled-style {
      background-color: var(--surface-sunken);
      box-shadow: inset 0 -2px 0 0 var(--border-subtle);
      border-radius: var(--radius-md) var(--radius-md) 0 0;
    }
    .ds-textarea.filled-style:hover, .ds-textarea.filled-style.hover { box-shadow: inset 0 -2px 0 0 var(--border-default); }
    .ds-textarea.filled-style.focused { box-shadow: inset 0 -2px 0 0 var(--primary-filled-bg); }
    .ds-textarea.filled-style.error { box-shadow: inset 0 -2px 0 0 var(--danger-outline-border); }
    .ds-textarea.filled-style.error:hover, .ds-textarea.filled-style.error.hover { box-shadow: inset 0 -2px 0 0 var(--danger-outline-border); }
    .ds-textarea.filled-style.focused.error { box-shadow: inset 0 -2px 0 0 var(--danger-outline-border); }
    .ds-textarea.filled-style.disabled:hover, .ds-textarea.filled-style.disabled.hover { box-shadow: inset 0 -2px 0 0 var(--border-subtle); }
    .ds-textarea textarea {
      display: block; width: 100%; border: none; background: none; outline: none;
      font-family: var(--font-sans); color: var(--content-primary);
      resize: vertical; padding: 0; box-sizing: border-box;
      font-size: var(--font-size-sm); min-height: var(--space-20);
    }
    .ds-textarea.sm textarea { font-size: var(--font-size-xs); min-height: var(--space-14); }
    .ds-textarea.md textarea { font-size: var(--font-size-sm); min-height: var(--space-20); }
    .ds-textarea.lg textarea { font-size: var(--font-size-base); min-height: var(--space-24); }
    .ds-textarea textarea::placeholder { color: var(--content-tertiary); }

    /* SELECTION CONTROLS */
    .ds-selection-group {
      display: flex;
      flex-direction: column;
      gap: var(--space-3);
    }

    .ds-checkbox-wrapper, .ds-radio-wrapper, .ds-switch-wrapper {
      display: flex;
      align-items: center;
      gap: var(--space-2-5);
      cursor: pointer;
      font-family: var(--font-sans);
      font-size: var(--font-size-sm);
      color: var(--content-primary);
    }
    .ds-checkbox-wrapper:hover .ds-checkbox:not(.checked):not(.indeterminate),
    .ds-radio-wrapper:hover .ds-radio:not(.selected) {
      box-shadow: inset 0 0 0 2px var(--border-default);
    }
    .ds-checkbox-wrapper.disabled, .ds-radio-wrapper.disabled, .ds-switch-wrapper.disabled {
      opacity: 0.5;
      cursor: not-allowed;
      color: var(--content-disabled);
    }
    .ds-checkbox-wrapper.disabled:hover .ds-checkbox,
    .ds-radio-wrapper.disabled:hover .ds-radio {
      box-shadow: inset 0 0 0 2px var(--border-default);
    }

    .ds-checkbox {
      width: 18px; height: 18px;
      border-radius: var(--radius-xs);
      box-shadow: inset 0 0 0 2px var(--border-default);
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      transition: all var(--motion-fast) var(--ease-standard);
      background: var(--surface-default);
    }
    .ds-checkbox.checked, .ds-checkbox.indeterminate {
      background-color: var(--primary-filled-bg);
      box-shadow: none;
    }
    .ds-checkbox svg { width: 12px; height: 12px; color: var(--primary-filled-fg); stroke-width: 3; }

    .ds-checkbox .material-symbols-rounded { font-size: 12px; }

    .ds-radio {
      width: 18px; height: 18px;
      border-radius: var(--radius-full);
      box-shadow: inset 0 0 0 2px var(--border-default);
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      transition: all var(--motion-fast) var(--ease-standard);
      background: var(--surface-default);
    }
    .ds-radio.selected { box-shadow: inset 0 0 0 2px var(--primary-filled-bg); }

    .ds-radio-dot {
      width: 8px; height: 8px;
      border-radius: var(--radius-full);
      background-color: var(--primary-filled-bg);
      transform: scale(0);
      transition: transform var(--motion-fast) var(--ease-spring);
    }
    .ds-radio.selected .ds-radio-dot { transform: scale(1); }

    .ds-form-switch {
      width: 40px; height: 22px;
      border-radius: var(--radius-full);
      background-color: var(--border-default);
      position: relative; flex-shrink: 0;
      transition: background-color var(--motion-fast) var(--ease-standard);
      cursor: pointer;
    }
    .ds-form-switch.on { background-color: var(--primary-filled-bg); }

    .ds-form-switch-thumb {
      width: 18px; height: 18px;
      border-radius: var(--radius-full);
      background-color: var(--surface-default);
      position: absolute; top: 2px;
      inset-inline-start: 2px;
      box-shadow: var(--shadow-xs);
      transition: inset-inline-start var(--motion-fast) var(--ease-spring);
    }
    .ds-form-switch.on .ds-form-switch-thumb { inset-inline-start: 20px; }

    /* SCROLL */
    ::-webkit-scrollbar {
      width: 8px;
      height: 8px;
    }

    ::-webkit-scrollbar-track {
      background: var(--surface-ground);
    }

    ::-webkit-scrollbar-thumb {
      background: var(--border-default);
      border-radius: 4px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: var(--border-strong);
    }

    /* ============================================================
       SPRINT C: Slider, Date Picker, Tag Input, File Upload, Pagination, Stepper
       ============================================================ */

    /* SLIDER */
    .ds-slider-wrapper {
      display: flex;
      flex-direction: column;
      gap: var(--space-2);
      width: 100%;
    }
    .ds-slider-label-row {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      font-family: var(--font-sans);
      font-size: var(--font-size-xs);
    }
    .ds-slider-label { color: var(--content-secondary); font-weight: var(--font-weight-medium); }
    .ds-slider-value { color: var(--content-primary); font-weight: var(--font-weight-semibold); font-variant-numeric: tabular-nums; }

    .ds-slider-track {
      position: relative;
      height: 6px;
      background-color: var(--neutral-tonal-bg);
      border-radius: var(--radius-full);
      cursor: pointer;
    }
    .ds-slider-track.disabled { opacity: 0.5; cursor: not-allowed; }

    .ds-slider-fill {
      position: absolute;
      top: 0; bottom: 0;
      inset-inline-start: 0;
      background-color: var(--primary-filled-bg);
      border-radius: var(--radius-full);
    }
    .ds-slider-track.disabled .ds-slider-fill { background-color: var(--content-disabled); }
    .ds-slider-wrapper.disabled .ds-slider-label,
    .ds-slider-wrapper.disabled .ds-slider-value { color: var(--content-disabled); }
    .ds-slider-wrapper.disabled .ds-slider-step-mark { color: var(--content-disabled); }

    .ds-slider-thumb {
      position: absolute;
      top: 50%;
      transform: translate(-50%, -50%);
      width: 20px; height: 20px;
      background-color: var(--surface-default);
      border-radius: var(--radius-full);
      box-shadow: 0 0 0 2px var(--primary-filled-bg), var(--shadow-sm);
      transition: box-shadow var(--motion-fast) var(--ease-standard);
      cursor: grab;
    }
    .ds-slider-thumb:hover, .ds-slider-thumb.hover {
      box-shadow: 0 0 0 2px var(--primary-filled-bg), 0 0 0 8px color-mix(in srgb, var(--primary-filled-bg) 15%, transparent), var(--shadow-sm);
    }
    .ds-slider-thumb:focus-visible {
      outline: none;
      box-shadow: 0 0 0 2px var(--primary-filled-bg), 0 0 0 8px color-mix(in srgb, var(--primary-filled-bg) 15%, transparent), var(--shadow-sm);
    }
    .ds-slider-thumb.active {
      box-shadow: 0 0 0 2px var(--primary-filled-bg), 0 0 0 10px color-mix(in srgb, var(--primary-filled-bg) 20%, transparent), var(--shadow-sm);
      cursor: grabbing;
    }
    .ds-slider-track.disabled .ds-slider-thumb {
      box-shadow: 0 0 0 2px var(--content-disabled), var(--shadow-sm);
      cursor: not-allowed;
    }

    .ds-slider-step-marks {
      display: flex;
      justify-content: space-between;
      padding: var(--space-1) 0 0;
    }
    .ds-slider-step-mark {
      font-family: var(--font-sans);
      font-size: var(--font-size-xs);
      color: var(--content-tertiary);
    }

    .ds-slider-tooltip {
      position: absolute;
      bottom: calc(100% + 8px);
      inset-inline-start: 50%;
      transform: translateX(-50%);
      background-color: var(--neutral-filled-bg);
      color: var(--neutral-filled-fg);
      font-family: var(--font-sans);
      font-size: var(--font-size-xs);
      font-weight: var(--font-weight-semibold);
      padding: var(--space-1) var(--space-2);
      border-radius: var(--radius-sm);
      box-shadow: var(--shadow-md);
      white-space: nowrap;
      pointer-events: none;
    }

    /* DATE PICKER */
    .ds-datepicker-wrapper {
      display: flex;
      flex-direction: column;
      gap: var(--space-2);
      width: 100%;
      max-width: 320px;
    }

    .ds-datepicker-calendar {
      background-color: var(--surface-raised);
      box-shadow: var(--shadow-lg);
      border-radius: var(--radius-lg);
      padding: var(--space-4);
      font-family: var(--font-sans);
    }

    .ds-datepicker-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: var(--space-3);
    }
    .ds-datepicker-month {
      font-size: var(--font-size-sm);
      font-weight: var(--font-weight-semibold);
      color: var(--content-primary);
    }
    .ds-datepicker-nav {
      display: flex;
      gap: var(--space-1);
    }
    .ds-datepicker-nav-btn {
      width: 28px; height: 28px;
      border: none; background: none;
      border-radius: var(--radius-sm);
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      color: var(--content-secondary);
      transition: background-color var(--motion-fast) var(--ease-standard);
    }
    .ds-datepicker-nav-btn:hover { background-color: var(--neutral-tonal-bg); }
    .ds-datepicker-nav-btn:focus-visible { outline: none; box-shadow: 0 0 0 2px var(--primary-filled-bg); }
    .ds-datepicker-nav-btn svg { width: 16px; height: 16px; }

    .ds-datepicker-nav-btn .material-symbols-rounded { font-size: 16px; }

    .ds-datepicker-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: var(--space-0-5);
      text-align: center;
    }
    .ds-datepicker-dow {
      font-size: var(--font-size-xs);
      font-weight: var(--font-weight-medium);
      color: var(--content-tertiary);
      padding: var(--space-1) 0;
    }
    .ds-datepicker-day {
      width: 36px; height: 36px;
      border: none; background: none;
      border-radius: var(--radius-sm);
      font-family: var(--font-sans);
      font-size: var(--font-size-sm);
      color: var(--content-primary);
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background-color var(--motion-fast) var(--ease-standard);
    }
    .ds-datepicker-day:hover { background-color: var(--neutral-tonal-bg); }
    .ds-datepicker-day:focus-visible { outline: none; box-shadow: 0 0 0 2px var(--primary-filled-bg); }
    .ds-datepicker-day.today { font-weight: var(--font-weight-semibold); box-shadow: inset 0 0 0 1px var(--primary-filled-bg); }
    .ds-datepicker-day.selected { background-color: var(--primary-filled-bg); color: var(--primary-filled-fg); }
    .ds-datepicker-day.in-range { background-color: var(--primary-tonal-bg); color: var(--primary-tonal-fg); border-radius: 0; }
    .ds-datepicker-day.range-start { background-color: var(--primary-filled-bg); color: var(--primary-filled-fg); border-start-start-radius: var(--radius-sm); border-end-start-radius: var(--radius-sm); border-start-end-radius: 0; border-end-end-radius: 0; }
    .ds-datepicker-day.range-end { background-color: var(--primary-filled-bg); color: var(--primary-filled-fg); border-start-start-radius: 0; border-end-start-radius: 0; border-start-end-radius: var(--radius-sm); border-end-end-radius: var(--radius-sm); }
    .ds-datepicker-day.outside { color: var(--content-tertiary); opacity: 0.5; }
    .ds-datepicker-day.disabled { color: var(--content-disabled); cursor: not-allowed; }
    .ds-datepicker-day.disabled:hover { background: none; }

    /* TAG INPUT */
    .ds-tag-input-wrapper {
      display: flex;
      flex-direction: column;
      gap: var(--space-1-5);
      width: 100%;
      max-width: 360px;
    }
    .ds-tag-input-label {
      font-family: var(--font-sans);
      font-size: var(--font-size-xs);
      font-weight: var(--font-weight-medium);
      color: var(--content-secondary);
    }
    .ds-tag-input {
      display: flex;
      flex-wrap: wrap;
      gap: var(--space-1-5);
      padding: var(--space-2) var(--space-3);
      background-color: var(--surface-default);
      border-radius: var(--radius-md);
      box-shadow: inset 0 0 0 1px var(--border-subtle);
      transition: box-shadow var(--motion-fast) var(--ease-standard);
      min-height: 40px;
      align-items: center;
    }
    .ds-tag-input:hover { box-shadow: inset 0 0 0 1px var(--border-default); }
    .ds-tag-input.focused { box-shadow: inset 0 0 0 2px var(--primary-filled-bg); }
    .ds-tag-input.error { box-shadow: inset 0 0 0 1px var(--danger-outline-border); }
    .ds-tag-input.error:hover, .ds-tag-input.error.hover { box-shadow: inset 0 0 0 1px var(--danger-outline-border); }
    .ds-tag-input.focused.error { box-shadow: inset 0 0 0 2px var(--danger-outline-border); }
    .ds-tag-input.disabled { opacity: 0.5; cursor: not-allowed; }
    .ds-tag-input.disabled:hover, .ds-tag-input.disabled.hover { box-shadow: inset 0 0 0 1px var(--border-subtle); }

    .ds-tag-input-wrapper.label-disabled .ds-tag-input-label { color: var(--content-disabled); }
    .ds-tag-input-wrapper.label-disabled .ds-tag-input-helper { color: var(--content-disabled); }
    .ds-tag-input-wrapper.label-error .ds-tag-input-label { color: var(--danger-outline-fg); }

    .ds-tag-input-tag {
      display: inline-flex;
      align-items: center;
      gap: var(--space-1);
      padding: var(--space-0-5) var(--space-2);
      background-color: var(--primary-tonal-bg);
      color: var(--primary-tonal-fg);
      border-radius: var(--radius-full);
      font-family: var(--font-sans);
      font-size: var(--font-size-xs);
      font-weight: var(--font-weight-medium);
      white-space: nowrap;
    }
    .ds-tag-input-tag-remove {
      width: 14px; height: 14px;
      border: none; background: none;
      color: inherit; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      opacity: 0.7; border-radius: var(--radius-full);
      padding: 0;
    }
    .ds-tag-input-tag-remove:hover { opacity: 1; background-color: color-mix(in srgb, currentColor 15%, transparent); }
    .ds-tag-input-tag-remove svg { width: 10px; height: 10px; }

    .ds-tag-input-tag-remove .material-symbols-rounded { font-size: 10px; }

    .ds-tag-input-field {
      flex: 1;
      min-width: 80px;
      border: none; background: none; outline: none;
      font-family: var(--font-sans);
      font-size: var(--font-size-sm);
      color: var(--content-primary);
      padding: 0;
    }
    .ds-tag-input-field::placeholder { color: var(--content-tertiary); }

    .ds-tag-input-overflow {
      font-family: var(--font-sans);
      font-size: var(--font-size-xs);
      color: var(--content-tertiary);
      white-space: nowrap;
    }
    .ds-tag-input-helper {
      font-family: var(--font-sans);
      font-size: var(--font-size-xs);
      color: var(--content-tertiary);
    }

    /* FILE UPLOAD */
    .ds-file-upload-zone {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: var(--space-3);
      padding: var(--space-8) var(--space-6);
      background-color: var(--surface-sunken);
      border: 2px dashed var(--border-default);
      border-radius: var(--radius-lg);
      text-align: center;
      transition: border-color var(--motion-fast) var(--ease-standard), background-color var(--motion-fast) var(--ease-standard);
      cursor: pointer;
      width: 100%;
    }
    .ds-file-upload-zone:hover { border-color: var(--primary-outline-border); }
    .ds-file-upload-zone:focus-visible { outline: none; box-shadow: 0 0 0 2px var(--primary-filled-bg); border-color: var(--primary-outline-border); }
    .ds-file-upload-zone.drag-over {
      border-color: var(--primary-filled-bg);
      background-color: var(--primary-tonal-bg);
    }
    .ds-file-upload-zone.error { border-color: var(--danger-outline-border); }
    .ds-file-upload-zone.error:hover { border-color: var(--danger-outline-border); }
    .ds-file-upload-zone.disabled { opacity: 0.5; cursor: not-allowed; }
    .ds-file-upload-zone.disabled:hover { border-color: var(--border-default); }

    .ds-file-upload-icon {
      width: 40px; height: 40px;
      color: var(--content-tertiary);
    }
    .ds-file-upload-icon svg { width: 100%; height: 100%; }

    .ds-file-upload-icon .material-symbols-rounded { font-size: 100%; }

    .ds-file-upload-zone.drag-over .ds-file-upload-icon { color: var(--primary-filled-bg); }

    .ds-file-upload-text {
      font-family: var(--font-sans);
      font-size: var(--font-size-sm);
      color: var(--content-secondary);
    }
    .ds-file-upload-text strong { color: var(--primary-filled-bg); cursor: pointer; }
    .ds-file-upload-hint {
      font-family: var(--font-sans);
      font-size: var(--font-size-xs);
      color: var(--content-tertiary);
    }

    .ds-file-upload-list {
      display: flex;
      flex-direction: column;
      gap: var(--space-2);
      width: 100%;
      margin-top: var(--space-3);
    }
    .ds-file-upload-item {
      display: flex;
      align-items: center;
      gap: var(--space-3);
      padding: var(--space-2-5) var(--space-3);
      background-color: var(--surface-default);
      border-radius: var(--radius-md);
      box-shadow: inset 0 0 0 1px var(--border-subtle);
    }
    .ds-file-upload-item.error { box-shadow: inset 0 0 0 1px var(--danger-outline-border); }
    .ds-file-upload-item-icon {
      width: 32px; height: 32px;
      border-radius: var(--radius-sm);
      background-color: var(--primary-tonal-bg);
      color: var(--primary-tonal-fg);
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .ds-file-upload-item-icon svg { width: 16px; height: 16px; }

    .ds-file-upload-item-icon .material-symbols-rounded { font-size: 16px; }

    .ds-file-upload-item.error .ds-file-upload-item-icon {
      background-color: var(--danger-tonal-bg);
      color: var(--danger-tonal-fg);
    }
    .ds-file-upload-item-info { flex: 1; min-width: 0; }
    .ds-file-upload-item-name {
      font-family: var(--font-sans);
      font-size: var(--font-size-sm);
      font-weight: var(--font-weight-medium);
      color: var(--content-primary);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .ds-file-upload-item-meta {
      font-family: var(--font-sans);
      font-size: var(--font-size-xs);
      color: var(--content-tertiary);
    }
    .ds-file-upload-item.error .ds-file-upload-item-meta { color: var(--danger-outline-fg); }
    .ds-file-upload-progress {
      width: 100%;
      height: 4px;
      background-color: var(--neutral-tonal-bg);
      border-radius: var(--radius-full);
      margin-top: var(--space-1);
      overflow: hidden;
    }
    .ds-file-upload-progress-bar {
      height: 100%;
      background-color: var(--primary-filled-bg);
      border-radius: var(--radius-full);
      transition: width var(--motion-standard) var(--ease-standard);
    }
    .ds-file-upload-item-remove {
      width: 20px; height: 20px;
      border: none; background: none;
      color: var(--content-tertiary);
      cursor: pointer; padding: 0;
      display: flex; align-items: center; justify-content: center;
      border-radius: var(--radius-sm);
      flex-shrink: 0;
    }
    .ds-file-upload-item-remove:hover { color: var(--danger-outline-fg); background-color: var(--danger-tonal-bg); }
    .ds-file-upload-item-remove:focus-visible { outline: none; box-shadow: 0 0 0 2px var(--primary-filled-bg); }
    .ds-file-upload-item-remove svg { width: 14px; height: 14px; }

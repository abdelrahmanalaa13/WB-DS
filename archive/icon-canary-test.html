<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Material Symbols Canary Test</title>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet">
  <style>
    body { font-family: sans-serif; background: #1a1a2e; color: #e8eef0; padding: 24px; }
    h1 { font-size: 18px; margin-bottom: 16px; }
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 12px; }
    .icon-card {
      background: #0f1e21;
      border-radius: 8px;
      padding: 16px;
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
    }
    .material-symbols-rounded {
      font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' -25, 'opsz' 24;
      font-size: 24px;
      color: #fe9566;
    }
    .icon-card .name { font-size: 11px; color: #8e8e9e; }
    .icon-card .ligature { font-size: 10px; color: #5c5c70; font-family: monospace; }
    .status { margin-top: 24px; padding: 16px; border-radius: 8px; }
    .pass { background: #0a2e1a; color: #34eba4; }
    .fail { background: #2e0a0a; color: #da4d43; }
  </style>
</head>
<body>
  <h1>Material Symbols Rounded - Canary Test (37 icons)</h1>
  <p style="color:#8e8e9e;margin-bottom:16px;">Config: Fill=0, Weight=300, Grade=-25, Optical Size=24</p>
  <div class="grid" id="grid"></div>
  <div class="status" id="status"></div>

  <script>
    const ICON_MAP = {
      plus: 'add',
      star: 'star',
      heart: 'favorite',
      close: 'close',
      check: 'check',
      settings: 'settings',
      user: 'person',
      sparkle: 'auto_awesome',
      bell: 'notifications',
      alert: 'error',
      info: 'info',
      warning: 'warning',
      danger: 'dangerous',
      minimize: 'minimize',
      maximize: 'open_in_full',
      edit: 'edit',
      copy: 'content_copy',
      send: 'send',
      more: 'more_vert',
      refresh: 'refresh',
      clock: 'schedule',
      chart: 'bar_chart',
      users: 'group',
      search: 'search',
      chevronRight: 'chevron_right',
      chevronLeft: 'chevron_left',
      chevronDown: 'expand_more',
      menu: 'menu',
      upload: 'upload',
      file: 'description',
      folder: 'folder',
      calendar: 'calendar_today',
      home: 'home',
      trash: 'delete',
      book: 'menu_book',
      billing: 'receipt_long',
      code: 'code',
    };

    const grid = document.getElementById('grid');
    const status = document.getElementById('status');
    let passed = 0;
    let failed = 0;
    const failures = [];

    for (const [key, ligature] of Object.entries(ICON_MAP)) {
      const card = document.createElement('div');
      card.className = 'icon-card';

      const icon = document.createElement('span');
      icon.className = 'material-symbols-rounded';
      icon.textContent = ligature;

      const name = document.createElement('div');
      name.className = 'name';
      name.textContent = key;

      const lig = document.createElement('div');
      lig.className = 'ligature';
      lig.textContent = ligature;

      card.appendChild(icon);
      card.appendChild(name);
      card.appendChild(lig);
      grid.appendChild(card);
    }

    // Check rendering after font loads
    document.fonts.ready.then(() => {
      for (const [key, ligature] of Object.entries(ICON_MAP)) {
        const icons = document.querySelectorAll('.material-symbols-rounded');
        let found = false;
        icons.forEach(el => {
          if (el.textContent === ligature) {
            // Check if the font actually rendered (not fallback text)
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            ctx.font = '24px "Material Symbols Rounded"';
            const iconWidth = ctx.measureText(ligature).width;
            ctx.font = '24px sans-serif';
            const fallbackWidth = ctx.measureText(ligature).width;
            if (iconWidth !== fallbackWidth) {
              passed++;
              found = true;
            }
          }
        });
        if (!found) {
          failed++;
          failures.push(key + ' (' + ligature + ')');
        }
      }

      const total = Object.keys(ICON_MAP).length;
      if (failed === 0) {
        status.className = 'status pass';
        status.innerHTML = 'PASS: All ' + total + '/' + total + ' icons rendered correctly with Material Symbols Rounded font.';
      } else {
        status.className = 'status fail';
        status.innerHTML = 'FAIL: ' + failed + '/' + total + ' icons did not render.<br>Failed: ' + failures.join(', ');
      }
    });
  </script>
</body>
</html>
